# ============================================================================
# Patra API Gateway - Main Configuration
# ============================================================================
# This gateway serves as the unified entry point for all Patra services.
# Routes are configured below with Consul-based service discovery.
# ============================================================================

# ----------------------------------------------------------------------------
# Server Configuration
# ----------------------------------------------------------------------------
server:
  port: 9528

# ----------------------------------------------------------------------------
# Spring Boot & Cloud Configuration
# ----------------------------------------------------------------------------
spring:
  application:
    name: patra-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Cloud Configuration
  cloud:
    # Consul Service Discovery
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        health-check-interval: 10s
        health-check-path: /actuator/health
        instance-id: ${spring.application.name}:${random.value}
        # 宿主机运行 + Consul 容器：使用 host.docker.internal 让 Consul 能访问宿主机服务
        prefer-ip-address: false
        hostname: ${SERVICE_HOSTNAME:host.docker.internal}

    # Gateway Route Configuration
    # Routes requests to downstream microservices using load balancing
    gateway:
      routes:
        # Ingest Service Route
        # Example: /patra-ingest/plans -> lb://patra-ingest/plans
        - id: patra-ingest
          uri: lb://patra-ingest
          predicates:
            - Path=/patra-ingest/**
          filters:
            - StripPrefix=1

        # Registry Service Route
        # Example: /patra-registry/provenance -> lb://patra-registry/provenance
        - id: patra-registry
          uri: lb://patra-registry
          predicates:
            - Path=/patra-registry/**
          filters:
            - StripPrefix=1

# ----------------------------------------------------------------------------
# Logging Configuration
# ----------------------------------------------------------------------------
logging:
  file:
    # Centralized log directory in project root
    path: ${PATRA_LOG_DIR:logs}
  layer: adapter
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.loadbalancer: INFO

# ----------------------------------------------------------------------------
# Actuator & Monitoring Configuration
# ----------------------------------------------------------------------------
# 注意：Metrics 通过 OTel Agent + Micrometer Bridge 导出到 OTel Collector
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
