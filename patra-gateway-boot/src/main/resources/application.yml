# ============================================================================
# Patra API Gateway - Main Configuration
# ============================================================================
# This gateway serves as the unified entry point for all Patra services.
# Routes are configured below with Nacos-based service discovery.
# ============================================================================

# ----------------------------------------------------------------------------
# Server Configuration
# ----------------------------------------------------------------------------
server:
  port: 9528

# ----------------------------------------------------------------------------
# Spring Boot & Cloud Configuration
# ----------------------------------------------------------------------------
spring:
  application:
    name: patra-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Cloud Configuration
  cloud:
    # Nacos Service Discovery
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        server-addr: ${NACOS_HOST:${PATRA_INFRA_HOST:localhost}}:${NACOS_PORT:8848}
        service: ${spring.application.name}
        fail-fast: true
        # gateway 通过 lb:// 转发下游，下游 scheme 通过 metadata 暴露给 LoadBalancer
        metadata:
          scheme: http

    # Gateway Route Configuration
    # Routes requests to downstream microservices using load balancing
    gateway:
      server:
        webflux:
          routes:
            # Ingest Service Route
            # Example: /patra-ingest/plans -> lb://patra-ingest/plans
            - id: patra-ingest
              uri: lb://patra-ingest
              predicates:
                - Path=/patra-ingest/**
              filters:
                - StripPrefix=1

            # Registry Service Route
            # Example: /patra-registry/provenance -> lb://patra-registry/provenance
            - id: patra-registry
              uri: lb://patra-registry
              predicates:
                - Path=/patra-registry/**
              filters:
                - StripPrefix=1

            # Catalog Service Route
            # Example: /patra-catalog/venues -> lb://patra-catalog/venues
            - id: patra-catalog
              uri: lb://patra-catalog
              predicates:
                - Path=/patra-catalog/**
              filters:
                - StripPrefix=1

# ----------------------------------------------------------------------------
# API Documentation Aggregation
# ----------------------------------------------------------------------------
# 通过 Gateway 聚合各微服务的 OpenAPI 文档
# 各服务的 /v3/api-docs 请求通过已有路由代理到下游
scalar:
  sources:
    - url: /patra-catalog/v3/api-docs
      title: Catalog Service
      slug: catalog
    - url: /patra-registry/v3/api-docs
      title: Registry Service
      slug: registry
    - url: /patra-ingest/v3/api-docs
      title: Ingest Service
      slug: ingest

# ----------------------------------------------------------------------------
# Logging Configuration
# ----------------------------------------------------------------------------
logging:
  file:
    # Centralized log directory in project root
    path: ${PATRA_LOG_DIR:logs}
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.loadbalancer: INFO

# ----------------------------------------------------------------------------
# Actuator & Monitoring Configuration
# ----------------------------------------------------------------------------
# 注意：Metrics 通过 OTel Agent + Micrometer Bridge 导出到 OTel Collector
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
