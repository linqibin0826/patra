# ============================================================================
# Patra API Gateway - Main Configuration
# ============================================================================
# This gateway serves as the unified entry point for all Patra services.
# Routes are configured below with Nacos-based service discovery.
# ============================================================================

# ----------------------------------------------------------------------------
# Server Configuration
# ----------------------------------------------------------------------------
server:
  port: 9528

# ----------------------------------------------------------------------------
# Spring Boot & Cloud Configuration
# ----------------------------------------------------------------------------
spring:
  application:
    name: patra-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Nacos Configuration Import
  # Loads service-specific and shared configurations from Nacos
  config:
    import:
      - "optional:nacos:${spring.application.name}-${spring.profiles.active:dev}.yaml?group=${NACOS_CONFIG_GROUP:${NACOS_GROUP:DEFAULT_GROUP}}&namespace=${NACOS_NAMESPACE_ID:${NACOS_NAMESPACE:public}}"
      - "optional:nacos:patra-${spring.profiles.active:dev}.yaml?group=${NACOS_CONFIG_GROUP:${NACOS_GROUP:DEFAULT_GROUP}}&namespace=${NACOS_NAMESPACE_ID:${NACOS_NAMESPACE:public}}"

  # Cloud Configuration
  cloud:
    # Nacos Service Discovery & Configuration
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE_ID:${NACOS_NAMESPACE:public}}
        group: ${NACOS_DISCOVERY_GROUP:${NACOS_GROUP:DEFAULT_GROUP}}

    # Gateway Route Configuration
    # Routes requests to downstream microservices using load balancing
    gateway:
      routes:
        # Ingest Service Route
        # Example: /patra-ingest/plans -> lb://patra-ingest/plans
        - id: patra-ingest
          uri: lb://patra-ingest
          predicates:
            - Path=/patra-ingest/**
          filters:
            - StripPrefix=1

        # Registry Service Route
        # Example: /patra-registry/provenance -> lb://patra-registry/provenance
        - id: patra-registry
          uri: lb://patra-registry
          predicates:
            - Path=/patra-registry/**
          filters:
            - StripPrefix=1

# ----------------------------------------------------------------------------
# Logging Configuration
# ----------------------------------------------------------------------------
logging:
  file:
    # Centralized log directory in project root
    path: ${PATRA_LOG_DIR:logs}
  layer: adapter
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.loadbalancer: INFO

# ----------------------------------------------------------------------------
# Actuator & Monitoring Configuration
# ----------------------------------------------------------------------------
# 注意：Metrics 通过 OTel Agent + Micrometer Bridge 导出到 OTel Collector
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
