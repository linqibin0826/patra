repos:
  # 1) Fast, language-agnostic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-endings
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=2000"]

  # 2) Java formatting — intentionally omitted
  # Using IntelliJ IDEA’s built-in formatter; pre-commit cannot run IntelliJ headless.
  # If you want CLI-enforced formatting, I can wire Spotless (eclipse-jdt) or another tool.

  # 3) Spelling for docs and code comments
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ["-S", "target,*.min.js,*generated*,*.lock", "-L", "nd,te,crate,clas"]

  # 4) Secret scanning (no baseline required)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        args: ["protect", "--verbose", "--redact", "--staged"]

  # 5) Local hooks for Maven fast feedback
  - repo: local
    hooks:
      # Fast compile of only the changed Maven modules at commit time
      - id: mvn-compile-changed-modules
        name: mvn compile (changed modules)
        entry: scripts/git/mvn_compile_changed_modules.sh
        language: system
        pass_filenames: true
        files: "(pom\\.xml|.*\\.java)$"

      # Run unit tests for changed modules on push (keeps commit-time snappy)
      - id: mvn-test-changed-modules-on-push
        name: mvn test (changed modules on push)
        entry: scripts/git/mvn_test_changed_modules.sh
        language: system
        pass_filenames: false
        stages: [push]
