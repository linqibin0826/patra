default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: "3.5.0"

repos:
  # 1) 通用 hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^docs/patra/specs/
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=2000']
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ['--fix=lf']

  # 2) Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # 3) Java 格式化（auto-apply）
  - repo: local
    hooks:
      - id: spotless-apply
        name: spotless apply (Java + gradle.kts)
        entry: ./gradlew spotlessApply -q --no-daemon
        language: system
        pass_filenames: false
        files: '\.java$|\.gradle\.kts$'
        stages: [pre-commit]

  # 4) commit-msg：commitlint
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional@19.5.0']
