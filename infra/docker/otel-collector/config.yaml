# OpenTelemetry Collector 配置
# 接收 OTLP 格式的 Traces/Metrics/Logs，路由到对应后端

connectors:
  # Span Metrics Connector - 从 traces 生成 RED 指标
  # 生成 traces_spanmetrics_calls_total 和 traces_spanmetrics_duration_bucket
  # namespace 确保生成的指标带 traces.spanmetrics 前缀，经 Prometheus exporter 后变成 patra_traces_spanmetrics_*
  spanmetrics:
    namespace: traces.spanmetrics
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - name: http.method
      - name: http.status_code
      - name: http.route
    exemplars:
      enabled: true
    dimensions_cache_size: 1000
    aggregation_temporality: AGGREGATION_TEMPORALITY_CUMULATIVE

receivers:
  # OTLP 接收器 - 接收来自应用的遥测数据
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 32  # 增加到 32MB，与 Loki 保持一致
      http:
        endpoint: 0.0.0.0:4318

processors:
  # 批处理 - 提高吞吐量，减少网络开销
  batch:
    timeout: 5s
    send_batch_size: 1000
    send_batch_max_size: 1500

  # 内存限制 - 防止 OOM
  # limit_mib: 容器内存限制的 ~90%（2G = 2048MB，90% ≈ 1800MB）
  # spike_limit_mib: 峰值缓冲，软限制 = limit - spike（达到软限制时开始拒绝数据）
  memory_limiter:
    check_interval: 1s
    limit_mib: 1800
    spike_limit_mib: 300

  # 资源处理器 - 添加通用属性
  resource:
    attributes:
      - key: environment
        value: development
        action: upsert
      - key: collector.name
        value: patra-otel-collector
        action: upsert

exporters:
  # 调试导出器 - 开发环境日志输出
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

  # Prometheus 导出器 - 指标暴露给 Prometheus 抓取
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: patra
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true

  # OTLP/gRPC 导出器 - 链路数据发送到 Tempo
  # sending_queue: 异步发送，防止下游阻塞导致 Collector 内存积压
  # retry_on_failure: 网络抖动时自动重试，避免数据丢失
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 100
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 120s

  # OTLP/HTTP 导出器 - 日志发送到 Loki（Loki 3.x 原生支持 OTLP）
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 100
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 120s

extensions:
  # 健康检查
  health_check:
    endpoint: 0.0.0.0:13133
    path: /

  # pprof 性能分析
  pprof:
    endpoint: 0.0.0.0:1777

  # zpages 调试页面
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]

  pipelines:
    # 链路管道 - 输出到 Tempo 和 spanmetrics connector
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/tempo, spanmetrics, debug]

    # 指标管道 - 接收应用指标和 spanmetrics 生成的指标
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus, debug]

    # 日志管道
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/loki, debug]

  telemetry:
    logs:
      level: info
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
