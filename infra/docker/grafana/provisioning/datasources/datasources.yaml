# Grafana 数据源配置
# 自动配置 Prometheus、Loki、Tempo 数据源

apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1
  - name: Tempo
    orgId: 1

datasources:
  # Prometheus - 指标数据源
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus
    jsonData:
      httpMethod: POST
      # 启用 Exemplar 查询
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo
          urlDisplayLabel: View Trace
      # 增量查询优化
      incrementalQuerying: true
      incrementalQueryOverlapWindow: 10m

  # Loki - 日志数据源
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    jsonData:
      maxLines: 1000
      # 派生字段 - 从日志跳转到链路
      derivedFields:
        - name: TraceID
          matcherRegex: '"traceId":"([a-f0-9]+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: View Trace
        - name: TraceID (OTel)
          matcherRegex: 'trace_id=([a-f0-9]+)'
          url: '$${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: View Trace

  # Tempo - 链路数据源
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    jsonData:
      httpMethod: GET
      # Service Graph 配置
      serviceMap:
        datasourceUid: prometheus
      # Node Graph 启用
      nodeGraph:
        enabled: true
      # 链路到日志关联
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: '{service_name="$${__span.tags.service.name}"} | json | trace_id="$${__trace.traceId}"'
      # 链路到指标关联
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        queries:
          - name: Request Rate
            query: 'sum(rate(http_server_request_duration_seconds_count{service_name="$${__span.tags.service.name}"}[5m]))'
          - name: Error Rate
            query: 'sum(rate(http_server_request_duration_seconds_count{service_name="$${__span.tags.service.name}", http_response_status_code=~"5.."}[5m])) / sum(rate(http_server_request_duration_seconds_count{service_name="$${__span.tags.service.name}"}[5m]))'
          - name: P95 Latency
            query: 'histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{service_name="$${__span.tags.service.name}"}[5m])) by (le))'
      # Loki 搜索
      lokiSearch:
        datasourceUid: loki

  # Alertmanager - 告警数据源
  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    uid: alertmanager
    jsonData:
      implementation: prometheus
