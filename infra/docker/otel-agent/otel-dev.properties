# OpenTelemetry Java Agent 配置 - 开发环境
# 文档: https://opentelemetry.io/docs/languages/java/configuration/

# ============================================================
# 服务标识
# ============================================================
# otel.service.name 会自动从 spring.application.name 读取，无需配置
# 如需覆盖，可在 VM 参数中指定: -Dotel.service.name=xxx
otel.resource.attributes=service.namespace=patra,deployment.environment=dev

# ============================================================
# OTLP 导出配置
# ============================================================
otel.exporter.otlp.endpoint=http://localhost:4317
otel.exporter.otlp.protocol=grpc

# ============================================================
# Traces 配置
# ============================================================
otel.traces.exporter=otlp
otel.traces.sampler=parentbased_traceidratio
otel.traces.sampler.arg=1.0

# ============================================================
# Metrics 配置
# ============================================================
# 启用 OTLP 指标导出，统一遥测管道
# Traces/Metrics/Logs 全部走 OTLP → OTel Collector
otel.metrics.exporter=otlp

# 启用 Micrometer 桥接（Agent 2.0+ 默认禁用）
# 将 Spring Boot/Micrometer 指标（HikariCP、Spring Batch、HTTP 等）桥接到 OTel
# 参考: https://opentelemetry.io/docs/languages/java/instrumentation/#micrometer
otel.instrumentation.micrometer.enabled=true

# ============================================================
# Logs 配置
# ============================================================
otel.logs.exporter=otlp
