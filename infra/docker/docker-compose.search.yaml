name: patra

# Search infrastructure services
# Elasticsearch for full-text search and analytics

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: patra-elasticsearch
    restart: unless-stopped
    ports:
      - "19200:9200"   # HTTP API
      - "19300:9300"   # Transport (cluster communication)
    environment:
      # Single node mode for development
      - discovery.type=single-node
      # Disable security for development (enable in production!)
      - xpack.security.enabled=false
      # JVM heap size (adjust based on available memory)
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # Timezone
      - TZ=Asia/Shanghai
    volumes:
      - ${HOME}/.patra/docker/es/data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
