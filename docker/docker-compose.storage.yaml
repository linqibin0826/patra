version: "3.9"

# Storage services for object storage and file management
# Currently includes MinIO for S3-compatible object storage

services:
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: patra-minio
    restart: unless-stopped
    ports:
      - "19000:9000"  # API port
      - "19001:9001"  # Console UI port
    environment:
      # Root credentials - change these in production
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      # Console redirect URL for proper UI access
      MINIO_BROWSER_REDIRECT_URL: http://localhost:19001
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    volumes:
      - ${HOME}/.papertrace/docker/minio/data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # MinIO initialization container - creates default buckets
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: patra-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be ready...';
      sleep 3;

      echo 'Configuring MinIO client...';
      mc alias set papertrace http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};

      echo 'Creating default bucket for development environment...';
      mc mb --ignore-existing papertrace/dev-ingest;

      echo 'Setting bucket policy to private (authenticated access only)...';
      mc anonymous set none papertrace/dev-ingest;

      echo 'MinIO initialization completed successfully!';
      echo 'Available buckets:';
      mc ls papertrace;

      echo '';
      echo '==================================================';
      echo 'MinIO is ready for patra-ingest service';
      echo 'Bucket: dev-ingest';
      echo 'Access: Private (authenticated only)';
      echo '==================================================';
      echo '';
      exit 0;
      "

networks:
  default:
    name: patra-net
