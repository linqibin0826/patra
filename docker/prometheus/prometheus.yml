# Prometheus 配置
# 从 OTel Collector 抓取指标，启用 Exemplar 存储

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: patra-prometheus
    environment: development

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# 抓取配置
scrape_configs:
  # Prometheus 自监控
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # OTel Collector 指标
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
    # 启用 Exemplar 采集
    enable_http2: true

  # OTel Collector 内部指标
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]

# 远程写入配置（可选，用于长期存储）
# remote_write:
#   - url: http://mimir:9009/api/v1/push

# Exemplar 存储配置
# 通过命令行参数 --enable-feature=exemplar-storage 启用
