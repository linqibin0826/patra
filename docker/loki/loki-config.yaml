# Loki 配置 - 单机模式（开发环境）
# 接收来自 OTel Collector 的日志

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info
  # gRPC 消息大小限制（解决 OTLP 日志查询 ResourceExhausted 错误）
  # OTLP 日志携带结构化元数据，查询响应会显著膨胀（压缩存储 128KB → gRPC 响应 ~8MB）
  grpc_server_max_recv_msg_size: 33554432  # 32MB
  grpc_server_max_send_msg_size: 33554432  # 32MB

# 查询前端配置
frontend:
  grpc_client_config:
    max_recv_msg_size: 33554432  # 32MB
    max_send_msg_size: 33554432  # 32MB

# 前端 Worker 配置
frontend_worker:
  grpc_client_config:
    max_recv_msg_size: 33554432  # 32MB
    max_send_msg_size: 33554432  # 32MB

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://alertmanager:9093

limits_config:
  # 日志保留期限
  retention_period: 168h  # 7 天
  # 允许结构化元数据
  allow_structured_metadata: true
  # 日志行大小限制
  max_line_size: 256kb
  # 每租户每秒日志量限制
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  # 查询限制
  max_entries_limit_per_query: 5000

# 压缩配置
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# 分析器配置（用于日志分析）
analytics:
  reporting_enabled: false
