# Grafana 仪表盘加载配置
# 从文件夹自动加载仪表盘 JSON

apiVersion: 1

providers:
  # 服务仪表盘
  - name: 'Patra Services'
    orgId: 1
    folder: 'Patra'
    folderUid: 'patra'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/patra

  # 基础设施仪表盘
  - name: 'Infrastructure'
    orgId: 1
    folder: 'Infrastructure'
    folderUid: 'infrastructure'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/infrastructure

# 注意：仪表盘 JSON 文件将在 Phase 4 创建
# 目前只配置加载路径，仪表盘目录暂时为空
