version: "3.9"

# Observability and monitoring services
# Optional services for APM, tracing, and performance monitoring
# Can be disabled to save resources during development

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: patra-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - TZ=Asia/Shanghai
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ${HOME}/.patra/docker/es/data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 10

  skywalking-oap:
    image: apache/skywalking-oap-server:10.2.0
    container_name: patra-skywalking-oap
    environment:
      TZ: Asia/Shanghai
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: elasticsearch:9200
      SW_STORAGE_ES_HTTP_PROTOCOL: http
      SW_STORAGE_ES_INDEX_SHARDS_NUMBER: 1
      SW_STORAGE_ES_INDEX_REPLICAS_NUMBER: 0
#      SW_LOGGING_LEVEL: DEBUG
      SW_TELEMETRY: prometheus
      SW_TELEMETRY_PROMETHEUS_HOST: 0.0.0.0
      SW_TELEMETRY_PROMETHEUS_PORT: 1234
      SW_HEALTH_CHECKER: default
      SW_LOG_LAL_FILES: sw-grpc-default
#      SW_CORE_GRPC_PORT: 11800      # gRPC/OTLP
#      SW_CORE_REST_PORT: 12800      # REST/UI 查询
#      SW_RECEIVER_ZIPKIN: default
#      SW_QUERY_ZIPKIN: default
#      SW_OTEL_RECEIVER: default
#      SW_OTEL_RECEIVER_ENABLED_HANDLERS: otlp-traces,otlp-metrics,otlp-logs
#      SW_OTEL_RECEIVER_ENABLED_HANDLERS: otlp-traces
    ports:
      - "11800:11800"   # gRPC (含 OTLP)
      - "12800:12800"   # HTTP / GraphQL
#    volumes:
#      - ${HOME}/.patra/docker/oap-lal/sw-grpc-default.yaml:/skywalking/config/lal/sw-grpc-sw-grpc-default.yaml:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:12800/internal/l7check >/dev/null || exit 0" ]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s
    depends_on:
      elasticsearch:
        condition: service_healthy

  skywalking-ui:
    image: apache/skywalking-ui:10.2.0
    container_name: patra-skywalking-ui
    environment:
      TZ: Asia/Shanghai
      SW_OAP_ADDRESS: "http://skywalking-oap:12800"
      SW_TIMEOUT: "30000"
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      skywalking-oap:
        condition: service_healthy

networks:
  default:
    name: patra-net
