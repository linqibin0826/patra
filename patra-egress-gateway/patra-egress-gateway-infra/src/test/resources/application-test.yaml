patra:
  egress:
    global:
      rateLimit: 1000
    resilience:
      max:
        timeout: 60s
        maxRetries: 5
        retryBackoff: 10s
        rateLimit: 1000
        circuitBreakerFailureThreshold: 50
        circuitBreakerWaitDuration: 30s
        whitelistResponseHeaders:
          - Content-Type
          - X-RateLimit-Limit
          - X-RateLimit-Remaining
          - X-RateLimit-Reset
          - Retry-After
          - ETag
          - Last-Modified
      defaultConfig:
        timeout: 30s
        maxRetries: 3
        retryBackoff: 2s
        rateLimit: 100
        circuitBreakerFailureThreshold: 50
        circuitBreakerWaitDuration: 60s
        whitelistResponseHeaders:
          - Content-Type
          - X-RateLimit-Limit
          - X-RateLimit-Remaining
          - Retry-After
          - ETag
