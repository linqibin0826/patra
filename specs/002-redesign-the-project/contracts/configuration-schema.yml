# Nacos Configuration Schema for Logging System
# Version: 1.0.0
# Description: Defines the YAML structure for dynamic log level configuration

# ============================================================================
# Common Logging Configuration (logging-common.yml)
# ============================================================================
# Data ID: logging-common.yml
# Group: DEFAULT_GROUP
# Description: Shared log level configuration across all services

logging:
  level:
    # Root logger (fallback for all unmatched loggers)
    root: INFO  # Allowed values: ERROR | WARN | INFO | DEBUG | TRACE

    # Project-wide log levels
    com.papertrace: DEBUG
    com.papertrace.domain: INFO  # Keep domain logs minimal
    com.papertrace.common: INFO

    # Framework log levels (reduce noise)
    org.springframework: WARN
    org.springframework.web: WARN
    org.springframework.boot: INFO
    org.mybatis: WARN
    com.zaxxer.hikari: INFO  # Connection pool
    org.apache.rocketmq: WARN

  # Async appender configuration
  appender:
    async:
      queueSize: 512  # Max queued log entries
      discardingThreshold: 0  # Never discard logs (0 = keep all)
      neverBlock: false  # Block if queue full (prevent log loss)

# ============================================================================
# Service-Specific Configuration (logging-patra-{service}.yml)
# ============================================================================
# Data ID: logging-patra-ingest.yml
# Group: DEFAULT_GROUP
# Description: Service-specific overrides for patra-ingest

logging:
  level:
    # Service-specific package overrides
    com.papertrace.ingest: DEBUG
    com.papertrace.ingest.adapter.job: DEBUG  # Debug scheduled jobs
    com.papertrace.ingest.infra.client: INFO  # External API calls
    com.papertrace.ingest.app.orchestrator: INFO  # Orchestration logic

  # Service-specific appender config (optional)
  file:
    name: /var/log/papertrace/patra-ingest.log
    max-size: 100MB
    max-history: 30  # Keep 30 days

# ============================================================================
# Environment-Specific Configuration (logging-{env}.yml)
# ============================================================================
# Data ID: logging-production.yml
# Group: DEFAULT_GROUP
# Description: Production environment log levels

logging:
  level:
    root: INFO
    com.papertrace: INFO  # Minimal logging in production
    com.papertrace.domain: WARN  # Domain errors only

  # Production-specific settings
  appender:
    async:
      queueSize: 1024  # Larger queue for high throughput
      discardingThreshold: 200  # Allow discarding DEBUG logs if queue 80% full

---

# Schema Validation Rules
# ======================

# Log Level Values (enum):
#   - ERROR: System failures requiring immediate attention
#   - WARN: Recoverable issues or degraded functionality
#   - INFO: Key business events and state changes
#   - DEBUG: Detailed processing flow for troubleshooting
#   - TRACE: Fine-grained diagnostics

# Logger Name Format:
#   - Must be valid Java package or class name
#   - Use dot notation (e.g., com.papertrace.ingest.SomeClass)
#   - "root" is special keyword for root logger

# Async Appender Settings:
#   queueSize:
#     type: integer
#     min: 64
#     max: 8192
#     description: Max queued log entries before blocking/discarding

#   discardingThreshold:
#     type: integer
#     min: 0
#     max: queueSize
#     description: Queue size threshold to start discarding TRACE/DEBUG logs
#                  0 = never discard, queueSize = discard all when queue full

#   neverBlock:
#     type: boolean
#     description: true = discard logs if queue full, false = block thread

# File Appender Settings:
#   name:
#     type: string
#     description: Full path to log file

#   max-size:
#     type: string
#     pattern: ^\d+(KB|MB|GB)$
#     description: Max file size before rotation

#   max-history:
#     type: integer
#     min: 1
#     max: 365
#     description: Number of archived log files to keep

---

# Configuration Precedence (highest to lowest)
# =============================================
# 1. Service-specific config (logging-patra-{service}.yml)
# 2. Environment-specific config (logging-{env}.yml)
# 3. Common config (logging-common.yml)
# 4. Application defaults (logback-spring.xml in starter)

---

# Dynamic Update Behavior
# ========================
# - Nacos pushes config changes to all connected instances
# - Application receives change event within 5-60 seconds
# - New log levels applied immediately via LoggingSystem API
# - No service restart required
# - Audit log written at INFO level when levels change

---

# Example: Temporary DEBUG for Production Troubleshooting
# ========================================================

# Step 1: Update logging-patra-ingest.yml in Nacos
logging:
  level:
    com.papertrace.ingest.infra.client.PubMedClient: DEBUG

# Step 2: Wait ~30 seconds for config refresh

# Step 3: View DEBUG logs for PubMedClient

# Step 4: Revert to INFO after troubleshooting
logging:
  level:
    com.papertrace.ingest.infra.client.PubMedClient: INFO

---

# Best Practices
# ===============
# 1. Default to INFO in production, DEBUG in staging, TRACE in development
# 2. Never set root=TRACE in production (severe performance impact)
# 3. Use service-specific configs for temporary DEBUG during incidents
# 4. Monitor log volume after level changes (alerting on sudden increases)
# 5. Document rationale in Nacos config description when changing levels
# 6. Set automatic revert policies (e.g., revert to INFO after 1 hour)
