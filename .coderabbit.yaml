# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# Patra CodeRabbit 配置
# - 决策 C：AI Review 不阻断 PR（Required Check 由分支保护规则控制，详见 PAP-15）
# - 评论使用中文；忽略生成物、lockfile、wrapper 与构建输出
language: zh-CN
tone_instructions: 用中文写 review；以工程师同事的语气，指出 bug 与设计风险，避免礼貌性赞美与"凑评论"。

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/build/**"
    - "!**/.gradle/**"
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/dist/**"
    - "!**/out/**"
    - "!**/target/**"
    - "!**/*.lock"
    - "!**/pnpm-lock.yaml"
    - "!**/package-lock.json"
    - "!**/yarn.lock"
    - "!**/gradle/wrapper/**"
    - "!gradlew"
    - "!gradlew.bat"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/CHANGELOG.md"
  path_instructions:
    - path: "patra-api/**/*.java"
      instructions: |
        后端遵循六边形 + DDD：domain 层禁止依赖框架/JPA/Spring；
        application 层为用例编排；adapter 层连接外部。
        指出违反分层的导入、贫血域模型、未受测试覆盖的领域逻辑。
    - path: "patra-portal/**/*.{ts,tsx}"
      instructions: |
        Next.js 15 / React 19 / TypeScript strict / Tailwind v4 / shadcn/ui。
        指出 any、未处理的 Promise、客户端组件中泄漏的 Server Action，
        以及未跟随 shadcn/ui 约定的样式。
    - path: "**/*.{sql,xml}"
      instructions: |
        MyBatis / DB schema 改动：检查索引、字段命名、可空性、迁移可逆性。

chat:
  auto_reply: true
