$schema: "https://json-schema.org/draft/2020-12/schema"
title: Papertrace Logging Configuration (Nacos)
type: object
additionalProperties: false
properties:
  logging:
    type: object
    additionalProperties: false
    properties:
      level:
        description: Map of logger names to levels. 'root' is a special logger.
        type: object
        additionalProperties:
          type: string
          enum: [ERROR, WARN, INFO, DEBUG, TRACE]
        properties:
          root:
            type: string
            enum: [ERROR, WARN, INFO, DEBUG, TRACE]
      appender:
        type: object
        additionalProperties: false
        properties:
          async:
            type: object
            additionalProperties: false
            properties:
              queueSize:
                type: integer
                minimum: 64
                maximum: 8192
                description: Max queued log entries
              discardingThreshold:
                type: integer
                minimum: 0
                maximum: 8192
                description: Start discarding DEBUG/TRACE when queue >= threshold (percent of queueSize)
              neverBlock:
                type: boolean
                description: true = discard when full, false = block
            required: [queueSize, discardingThreshold, neverBlock]
      file:
        type: object
        additionalProperties: false
        properties:
          name:
            type: string
            description: Absolute path to log file
          max-size:
            type: string
            pattern: "^\\d+(KB|MB|GB)$"
          max-history:
            type: integer
            minimum: 1
            maximum: 365
required: [logging]

description: |
  JSON Schema for validating Nacos YAML used to control log levels and appenders.
  This schema intentionally focuses on structure and value ranges. Cross-field
  constraints such as `discardingThreshold <= queueSize` are documented but not
  enforced by JSON Schema here.

examples:
  - logging:
      level:
        root: INFO
        com.papertrace: DEBUG
      appender:
        async:
          queueSize: 512
          discardingThreshold: 0
          neverBlock: false
