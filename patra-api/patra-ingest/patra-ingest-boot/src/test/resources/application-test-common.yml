# 测试环境公共配置 - 集成测试和 E2E 测试共享
#
# 此配置文件包含所有测试环境的公共配置项，减少重复配置。
# 差异化配置在各自的 profile 文件中（application-integration-test.yml, application-e2e-test.yml）

spring:
  application:
    name: patra-ingest
  # 覆盖 config.import，仅加载本地测试配置
  config:
    import:
      - "classpath:ingest-error-config.yaml"
      - "classpath:ingest-rocketmq.yaml"
  cloud:
    consul:
      enabled: false  # 禁用服务注册（测试环境）
  datasource:
    # 由 Testcontainers 动态配置
    url: ${spring.datasource.url}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: ${spring.datasource.driver-class-name}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  # 启用 Flyway 自动初始化测试数据库
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

# RocketMQ 配置（由 Testcontainers 动态配置）
rocketmq:
  name-server: ${rocketmq.name-server}
  producer:
    # producer.group 在各自的 profile 中覆盖
    send-message-timeout: 3000

# XXL-Job 配置（测试环境禁用）
xxl:
  job:
    enabled: false

# Patra Ingest 配置
patra:
  ingest:
    exec:
      lease-ttl-seconds: 60
      heartbeat-interval-seconds: 20
    outbox-relay:
      enabled: true
      batch-size: 10
      lease-duration: PT30S
    # Outbox MQ 配置
    outbox:
      send-timeout: 3000
      topic-prefix: ""  # 测试环境不使用前缀（RocketMQ 自动创建 Topic）
      strict-channel-whitelist: false
      channel-mapping:
        TASK_READY: INGEST_TASK_READY
        PUBLICATION_READY: INGEST_PUBLICATION_READY
    # MQ 消费者配置（Topic 名称）
    # 使用实际发布 Topic（INGEST_TASK），而非旧的 INGEST_TASK_READY
    mq:
      topics:
        task-ready: ${TOPIC_PREFIX:}INGEST_TASK
      # consumer-groups 在各自的 profile 中配置
    # listener 开关在各自的 profile 中配置
linqibin:
  starter:
    # 对象存储配置（测试环境使用虚拟配置）
    object-storage:
      active-provider: minio
      providers:
        minio:
          endpoint: http://localhost:9000
          access-key: minioadmin
          secret-key: minioadmin
          bucket: patra-test

# Task 配置
task:
  execution:
    lease:
      duration: 60
      renewal-interval: 20
    heartbeat:
      failure-threshold: 3
    fail-fast: false

# Management & Monitoring (禁用测试环境不需要的)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  metrics:
    export:
      prometheus:
        enabled: false

# 日志配置
logging:
  level:
    dev.linqibin: INFO
    org.testcontainers: INFO
    org.apache.rocketmq: WARN
    org.springframework.cloud: WARN
    org.springframework.cloud.consul: WARN
