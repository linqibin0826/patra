# 端到端测试环境配置 - 测试完整业务流程
#
# 此配置用于 E2E Test，测试完整的业务流程：
# - Outbox 表 → OutboxRelay → RocketMQ → TaskReadyMessageListener → 业务处理
# - 完整的事务、重试、幂等性验证
#
# 特点：启用所有业务组件，包括真实的 TaskReadyMessageListener
#
# 继承关系：此配置会自动加载 application-test-common.yml 的公共配置（通过 Spring Profile 机制）

spring:
  # 导入公共测试配置
  config:
    import:
      - "optional:classpath:application-test-common.yml"
      - "classpath:ingest-error-config.yaml"
      - "classpath:ingest-rocketmq.yaml"

# RocketMQ Producer Group（覆盖公共配置）
rocketmq:
  producer:
    group: patra_ingest_producer_e2e_test

# Patra Ingest 配置（差异部分）
patra:
  ingest:
    # MQ 消费者配置（E2E 测试中使用真实的业务监听器）
    mq:
      consumer-groups:
        task-ready: ingest-task-ready-consumer-group-e2e
    # 监听器开关配置（E2E 测试中启用业务监听器）
    listener:
      task-ready:
        enabled: true  # 启用 TaskReadyMessageListener，测试完整业务流程
