# 集成测试环境配置 - 测试基础设施组件（Publisher、RocketMQ、数据库）
#
# 此配置用于 Integration Test，专注于测试：
# - RocketMQ 消息发送和接收
# - 数据库操作
# - 消息序列化和元数据映射
#
# 特点：禁用业务监听器（TaskReadyMessageListener），使用测试专用 Consumer
#
# 继承关系：此配置会自动加载 application-test-common.yml 的公共配置（通过 Spring Profile 机制）

spring:
  # 导入公共测试配置
  config:
    import:
      - "optional:classpath:application-test-common.yml"

# RocketMQ Producer Group（覆盖公共配置）
rocketmq:
  producer:
    group: patra_ingest_producer_integration_test
  # 使用唯一的实例名称，避免与 e2e-test 上下文的消费者冲突（SHUTDOWN_ALREADY）
  consumer:
    instance-name: patra-ingest-integration-test

# Patra Ingest 配置（差异部分）
patra:
  ingest:
    # MQ 消费者配置（集成测试不使用真实的业务监听器）
    mq:
      consumer-groups:
        task-ready: ${CONSUMER_GROUP_PREFIX:}ingest-task-ready-consumer-group
    # 监听器开关配置（集成测试中禁用业务监听器）
    listener:
      task-ready:
        enabled: false  # 禁用 TaskReadyMessageListener
