# ArchUnit 配置文件
# patra-ingest 模块架构测试配置
# 用于验证六边形架构 + DDD 的核心约束

# ========================================
# 基本配置
# ========================================

# 当规则没有匹配到任何类时是否失败
# false = 允许空规则通过（推荐，避免误报）
archRule.failOnEmptyShould=false

# ========================================
# 冻结模式配置（逐步修复架构违规）
# ========================================

# 冻结规则的存储路径
# 首次运行会在此目录下创建 stored.rules 文件，记录现有违规
# 后续运行会对比此文件，禁止新增违规，要求逐步减少违规
freeze.store.default.path=patra-ingest-boot/src/test/resources/archunit

# 是否允许创建冻结存储（首次运行时创建）
# true = 如果目录不存在，自动创建并记录当前违规
# false = 如果目录不存在，测试失败
freeze.store.default.allowStoreCreation=true

# 是否重新冻结（更新 stored.rules）
# false = 锁定当前违规基线，禁止新增（推荐）
# true = 每次运行更新基线（仅在大规模重构时使用）
freeze.refreeze=false

# ========================================
# 性能优化配置
# ========================================

# 类缓存路径（避免重复扫描类）
# ArchUnit 会将扫描的类缓存到此目录，加速后续运行
cache.default.path=~/.archunit-cache

# ========================================
# 使用说明
# ========================================

# 1. 首次运行（创建冻结基线）：
#    mvn test -Dtest=IngestArchitectureTest
#    → 会在 patra-ingest-boot/src/test/resources/archunit/ 下创建 stored.rules
#    → 记录当前所有架构违规
#
# 2. 日常运行（禁止新增违规）：
#    mvn test -Dtest=IngestArchitectureTest
#    → 如果新增违规，测试失败
#    → 如果减少违规，测试通过
#
# 3. 大规模重构时（重置基线）：
#    临时设置 freeze.refreeze=true
#    mvn test -Dtest=IngestArchitectureTest
#    → 更新 stored.rules，记录新的违规基线
#    → 重构完成后，立即改回 freeze.refreeze=false
#
# 4. CI/CD 集成：
#    Git pre-commit hook 会自动运行：
#    scripts/git/mvn_archunit_changed_modules.sh
#    → 仅对变更的模块运行架构测试，提升性能

# ========================================
# 冻结模式工作流程
# ========================================

# 第一阶段：创建基线（首次运行）
# ┌────────────────────────────────────────┐
# │ mvn test -Dtest=IngestArchitectureTest │
# └─────────────────┬──────────────────────┘
#                   ↓
#         发现 50 个架构违规
#                   ↓
#         创建 stored.rules 文件
#         记录这 50 个违规的指纹
#                   ↓
#            测试通过 ✅

# 第二阶段：禁止新增（日常开发）
# ┌────────────────────────────────────────┐
# │ 开发者修改代码，引入新的架构违规       │
# └─────────────────┬──────────────────────┘
#                   ↓
# ┌────────────────────────────────────────┐
# │ mvn test -Dtest=IngestArchitectureTest │
# └─────────────────┬──────────────────────┘
#                   ↓
#         发现 51 个架构违规
#         （新增 1 个）
#                   ↓
#         与 stored.rules 对比
#                   ↓
#            测试失败 ❌
#         提示："检测到新增架构违规"

# 第三阶段：逐步修复（持续改进）
# ┌────────────────────────────────────────┐
# │ 开发者修复 5 个架构违规                │
# └─────────────────┬──────────────────────┘
#                   ↓
# ┌────────────────────────────────────────┐
# │ mvn test -Dtest=IngestArchitectureTest │
# └─────────────────┬──────────────────────┘
#                   ↓
#         发现 45 个架构违规
#         （减少 5 个）
#                   ↓
#         与 stored.rules 对比
#                   ↓
#            测试通过 ✅
#         自动更新 stored.rules（减少到 45 个）

# ========================================
# 故障排查
# ========================================

# 问题 1: 测试失败，提示 "检测到新增架构违规"
# 解决方案：
#   1. 查看测试输出，找到具体违规的类和位置
#   2. 修复代码，确保符合架构约束
#   3. 重新运行测试

# 问题 2: 需要临时跳过某些规则
# 解决方案：
#   在测试类中注释掉对应的 @Test 方法

# 问题 3: 大规模重构后，违规数量激增
# 解决方案：
#   1. 临时设置 freeze.refreeze=true
#   2. 运行测试，更新基线
#   3. 立即改回 freeze.refreeze=false
#   4. 提交 stored.rules 更新到 Git

# ========================================
# 最佳实践
# ========================================

# 1. ✅ 在 CI/CD 中运行架构测试
#    → 防止架构违规合并到主分支
#
# 2. ✅ 定期 Code Review 时关注架构测试结果
#    → 讨论架构设计的合理性
#
# 3. ✅ 每个 Sprint 设定架构改进目标
#    → 例如："本 Sprint 修复 10 个架构违规"
#
# 4. ✅ 新功能开发时确保零新增违规
#    → 技术债只减不增
#
# 5. ❌ 不要频繁 refreeze
#    → 会掩盖新增违规，失去冻结模式的意义
