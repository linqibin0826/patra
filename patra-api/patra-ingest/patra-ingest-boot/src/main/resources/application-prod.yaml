# Expression compiler configuration — production profile
#
# Profile: prod
# Goal: deterministic behavior and guardrails. STRICT mode enabled; conservative query/param caps.

spring:
  config:
    activate:
      on-profile: prod

# Safety modes
expr:
  # In prod, fail fast on missing fn/transform and unsupported NOT
  strict: true
  multi:
    # IMPORTANT: MULTI repeat is disabled by default (use join transforms)
    # Enable only when adapter serialization supports repeated params end-to-end
    repeat-enabled: false

# Compiler behavior
patra:
  expr:
    compiler:
      enabled: true
      query-param-bridge:
        # Bridge aggregated boolean query to provider param via std_key=query
        enabled: true
      # Guardrails — adjust per provider if needed
      max-query-length: 5000   # Hard cap: 5 KB boolean query
      warn-param-count: 50     # Soft warning above 50 params
      max-param-count: 100     # Hard error above 100 params
