server:
  port: 6100

spring:
  application:
    name: patra-ingest
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      # Local configuration files (error handling and message queue)
      - "classpath:ingest-error-config.yaml"
      - "classpath:ingest-rocketmq.yaml"
      # Service-specific configuration from Nacos
      - "optional:nacos:${spring.application.name}-${spring.profiles.active:dev}.yaml?group=${NACOS_CONFIG_GROUP:${NACOS_GROUP:DEFAULT_GROUP}}&namespace=${NACOS_NAMESPACE_ID:${NACOS_NAMESPACE:public}}"
      # Shared platform configuration from Nacos
      - "optional:nacos:patra-${spring.profiles.active:dev}.yaml?group=${NACOS_CONFIG_GROUP:${NACOS_GROUP:DEFAULT_GROUP}}&namespace=${NACOS_NAMESPACE_ID:${NACOS_NAMESPACE:public}}"
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE_ID:${NACOS_NAMESPACE:public}}
        group: ${NACOS_DISCOVERY_GROUP:${NACOS_GROUP:DEFAULT_GROUP}}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0.1.0

feign:
  client:
    config:
      default:
        connectTimeout: 2000
        readTimeout: 5000

xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://localhost:7070/xxl-job-admin}
    executor:
      ip: ${XXL_JOB_EXECUTOR_IP:host.docker.internal}
      # Log directory in centralized logs folder
      logpath: ${XXL_JOB_EXECUTOR_LOG_PATH:${PATRA_LOG_DIR:/Users/linqibin/Desktop/Patra-api/logs}/xxl-job/patra-ingest}
      logretentiondays: ${XXL_JOB_LOG_RETENTION_DAYS:30}

patra:
  ingest:
    exec:
      # Lease time-to-live in seconds for execution lock
      lease-ttl-seconds: ${INGEST_LEASE_TTL:60}
      # Heartbeat interval to maintain lease
      heartbeat-interval-seconds: ${INGEST_HEARTBEAT_INTERVAL:20}
    outbox-relay:
      enabled: true
      # Number of outbox records to process per batch
      batch-size: 200
      # Duration to hold relay execution lease (ISO-8601 format)
      lease-duration: PT30S

task:
  execution:
    lease:
      # Task execution lease duration in seconds
      duration: ${TASK_EXECUTION_LEASE_DURATION:60}
      # Lease renewal interval in seconds
      renewal-interval: ${TASK_EXECUTION_LEASE_RENEWAL_INTERVAL:20}
    heartbeat:
      # Number of consecutive heartbeat failures before task is considered dead
      failure-threshold: ${TASK_EXECUTION_HEARTBEAT_FAILURE_THRESHOLD:3}
    # When true, fail immediately on first error instead of continuing
    fail-fast: ${TASK_EXECUTION_FAIL_FAST:false}

logging:
  file:
    # Centralized log directory in project root
    path: ${PATRA_LOG_DIR:/Users/linqibin/Desktop/Patra-api/logs}

# ----------------------------------------------------------------------------
# Actuator & Monitoring Configuration
# ----------------------------------------------------------------------------
# 注意：Metrics 通过 OTel Agent + Micrometer Bridge 导出到 OTel Collector
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
