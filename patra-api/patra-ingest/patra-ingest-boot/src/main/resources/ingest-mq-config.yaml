spring:
  cloud:
    stream:
      defaultBinder: rocketmq
      binders:
        rocketmq:
          type: rocketmq
          environment:
            spring:
              cloud:
                stream:
                  rocketmq:
                    binder:
                      name-server: ${ROCKETMQ_NAMESRV:127.0.0.1:9876}
                      access-key: ${ROCKETMQ_AK:}
                      secret-key: ${ROCKETMQ_SK:}
      default:
        producer:
          # Boot converts this string to SpEL and injects it into ProducerProperties#setPartitionKeyExpression
          partition-key-expression: "headers['partitionKey'] != null ? headers['partitionKey'] : headers['KEYS']"
          partition-count: 4
      bindings:
        # Producer binding for StreamBridge
        INGEST_TASK_READY-out-0:
          binder: rocketmq
          destination: INGEST_TASK_READY
          content-type: application/json
          producer:
            partition-key-expression: "headers['partitionKey']"
            partition-count: 4
        # Consumer binding
        ingestTaskReadyConsumer-in-0:
          binder: rocketmq
          destination: INGEST_TASK_READY
          group: ingest-consumer
          content-type: application/json
          consumer:
            concurrency: 2
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-max-interval: 10000
            back-off-multiplier: 2.0

papertrace:
  ingest:
    outbox:
      publisher: ${PUBLISHER_IMPL:rocketmq}
      strict-channel-whitelist: ${OUTBOX_STRICT_CHANNEL_WHITELIST:false}
      allowed-channels:
        - INGEST_TASK_READY
