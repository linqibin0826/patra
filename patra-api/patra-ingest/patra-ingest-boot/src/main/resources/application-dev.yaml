# Expression compiler configuration — development profile
#
# Profile: dev
# Goal: fast iteration and graceful degradation. STRICT mode disabled; no query/param limits.

spring:
  config:
    activate:
      on-profile: dev

# Safety modes
expr:
  # In dev, prefer warnings over hard failures so teams can iterate quickly
  strict: false
  multi:
    # IMPORTANT: MULTI repeat is disabled by default
    # When false (default): MULTI std_keys must use join transforms (LIST_JOIN, FILTER_JOIN)
    # When true: emit repeated provider params (requires adapter serialization support)
    repeat-enabled: false

# Compiler behavior
patra:
  expr:
    compiler:
      enabled: true
      query-param-bridge:
        # Bridge aggregated boolean query to provider param via std_key=query
        enabled: true
      # No limits in dev
      max-query-length: 0
      warn-param-count: 0
      max-param-count: 0
