# Development profile overrides
# 基础设施 host 来自 zsh env 的 $PATRA_INFRA_HOST（Mac mini docker）
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${PATRA_INFRA_HOST:127.0.0.1}:15432/patra_ingest
    username: postgres
    password: 123456
  data:
    redis:
      url: redis://${PATRA_INFRA_HOST:127.0.0.1}:16379

  # dev 场景：见 patra-registry application-dev.yml 同段说明
  cloud:
    consul:
      discovery:
        ip-address: ${TAILSCALE_IP:}
        register-health-check: false
        heartbeat:
          enabled: true

# 可观测性：开箱即用（零配置）
# - Tracing/Logging: OTel Agent 自动处理
# - Metrics: applicationName 自动取 spring.application.name，environment 自动取 spring.profiles.active

patra:
  starter:
    expr:
      mode:
        strict: false
        multi:
          repeat-enabled: false
      compiler:
        enabled: true
        query-param-bridge:
          enabled: true
        max-query-length: 0
        warn-param-count: 0
        max-param-count: 0

linqibin:
  starter:
    object-storage:
      active-provider: minio
      providers:
        minio:
          endpoint: http://${PATRA_INFRA_HOST:127.0.0.1}:19000
          access-key: ${MINIO_ACCESS_KEY:minioadmin}
          secret-key: ${MINIO_SECRET_KEY:minioadmin123}
          bucket: dev-ingest
      retry:
        max-attempts: 3
        wait-duration: 1000

logging:
  level:
    dev.linqibin: DEBUG
    dev.linqibin.patra.starter.expr.compiler: DEBUG
