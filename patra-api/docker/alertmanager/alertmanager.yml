# Alertmanager 配置
# 告警路由与通知

global:
  # 解析超时
  resolve_timeout: 5m
  # SMTP 配置（可选）
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@example.com'
  # smtp_auth_username: 'alertmanager'
  # smtp_auth_password: 'password'

# 告警路由
route:
  # 分组键 - 按服务和告警名称分组
  group_by: ['alertname', 'service']
  # 分组等待时间
  group_wait: 30s
  # 分组发送间隔
  group_interval: 5m
  # 重复发送间隔
  repeat_interval: 4h
  # 默认接收者
  receiver: 'default-receiver'

  # 子路由
  routes:
    # 严重告警 - 立即发送
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h

    # 警告级别
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 1m
      repeat_interval: 6h

# 接收者配置
receivers:
  # 默认接收者 - 开发环境仅记录日志
  - name: 'default-receiver'
    # webhook_configs:
    #   - url: 'http://localhost:5001/webhook'

  # 严重告警接收者
  - name: 'critical-receiver'
    # 配置实际通知渠道
    # webhook_configs:
    #   - url: 'http://your-webhook-server/critical'
    # email_configs:
    #   - to: 'oncall@example.com'

  # 警告接收者
  - name: 'warning-receiver'
    # webhook_configs:
    #   - url: 'http://your-webhook-server/warning'

# 抑制规则 - 防止告警风暴
inhibit_rules:
  # 当存在严重告警时，抑制同服务的警告告警
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

# 模板配置
# templates:
#   - '/etc/alertmanager/templates/*.tmpl'
