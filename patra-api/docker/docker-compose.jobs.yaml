version: "3.9"

# Job scheduling and message queue services
# Optional async workload services for batch processing and event-driven workflows
# Can be disabled when not working on scheduled jobs or message-driven features

services:
  xxl-job-admin:
    image: xuxueli/xxl-job-admin:3.2.0
    container_name: patra-xxl-job-admin
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PARAMS: >
        --server.port=8080
        --server.servlet.context-path=/xxl-job-admin
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        --spring.datasource.username=xxl_job
        --spring.datasource.password=xxl_job_123456
        --xxl.job.accessToken=
    volumes:
      - ${HOME}/.patra/docker/xxl-job-admin/logs:/data/applogs
    ports:
      - "7070:8080"         # http://localhost:7070/xxl-job-admin
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: patra-rocketmq-namesrv
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    command: [ "sh", "mqnamesrv" ]
    ports:
      - "9876:9876"           # NameServer
    volumes:
      - ${HOME}/.patra/docker/rocketmq/namesrv/logs:/home/rocketmq/logs
      - ${HOME}/.patra/docker/rocketmq/namesrv/store:/home/rocketmq/store
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9876'" ]
      interval: 10s
      timeout: 5s
      retries: 10

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: patra-rocketmq-broker
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: "-Xms512m -Xmx2g -XX:+UseG1GC"  # Optimized JVM settings for development
      # 自动获取宿主机 IP 并注入到 broker 配置
      BROKER_IP1: ${BROKER_IP1:-}  # 可通过环境变量覆盖，否则自动检测
    command:
      - sh
      - -c
      - |
        # 复制基础配置
        cp /home/rocketmq/rocketmq-5.3.1/conf/broker.conf /tmp/broker.conf

        # 如果没有设置 BROKER_IP1 环境变量，则自动获取宿主机 IP
        if [ -z "$$BROKER_IP1" ]; then
          echo "开始自动检测宿主机 IP..."

          # 方法 1: 通过 host.docker.internal 解析（Docker Desktop）
          # 获取所有解析结果，选择第一个有效的局域网 IP
          for ip in $$(getent ahosts host.docker.internal 2>/dev/null | awk '{print $$1}' | sort -u); do
            if echo "$$ip" | grep -qE '^(192\.168\.|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)'; then
              BROKER_IP1="$$ip"
              echo "方法1成功: host.docker.internal -> $$BROKER_IP1"
              break
            fi
          done

          if [ -z "$$BROKER_IP1" ]; then
            echo "方法1失败: host.docker.internal 未解析到有效的局域网 IP"
          fi

          # 方法 2: 通过 /proc/net/route 获取网关（兼容性更好）
          if [ -z "$$BROKER_IP1" ] && [ -f "/proc/net/route" ]; then
            # 从路由表获取默认网关
            GATEWAY=$$(awk '$$2 == "00000000" {gateway = "0x" $$3; cmd="printf \"%d.%d.%d.%d\" " \
              substr(gateway,7,2) " " substr(gateway,5,2) " " substr(gateway,3,2) " " substr(gateway,1,2); \
              cmd | getline result; close(cmd); print result; exit}' /proc/net/route)

            if [ -n "$$GATEWAY" ]; then
              echo "检测到网关: $$GATEWAY"

              # 验证网关 IP 是否有效
              if [ "$$GATEWAY" = "172.17.0.1" ]; then
                echo "方法2跳过: 使用 Docker 默认 bridge 网络"
              elif echo "$$GATEWAY" | grep -qE '^(192\.168\.|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)'; then
                BROKER_IP1="$$GATEWAY"
                echo "方法2成功: 使用网关 IP -> $$BROKER_IP1"
              else
                echo "方法2失败: $$GATEWAY 不是有效的局域网 IP，忽略"
              fi
            fi
          fi

          # 方法 2.5: 使用 ip route 命令（更现代的方式）
          if [ -z "$$BROKER_IP1" ] && command -v ip >/dev/null 2>&1; then
            # 尝试获取到外部网络（如 8.8.8.8）的路由，提取网关
            GATEWAY=$$(ip route get 8.8.8.8 2>/dev/null | grep -oP 'via \K[0-9.]+' | head -1)
            if [ -n "$$GATEWAY" ]; then
              echo "检测到网关（ip route）: $$GATEWAY"
              if echo "$$GATEWAY" | grep -qE '^(192\.168\.|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)'; then
                BROKER_IP1="$$GATEWAY"
                echo "方法2.5成功: 使用网关 IP -> $$BROKER_IP1"
              else
                echo "方法2.5失败: $$GATEWAY 不是有效的局域网 IP"
              fi
            fi
          fi

          # 方法 3: 检测容器自身 IP 并推断宿主机 IP（尝试网关地址 .1）
          if [ -z "$$BROKER_IP1" ]; then
            CONTAINER_IP=$$(hostname -i | awk '{print $$1}')
            SUBNET=$$(echo $$CONTAINER_IP | cut -d'.' -f1-3)

            echo "容器 IP: $$CONTAINER_IP, 子网: $$SUBNET.0/24"

            # 尝试网关地址（通常是 .1）
            GATEWAY_IP="$$SUBNET.1"
            echo "尝试连接网关: $$GATEWAY_IP"

            # 使用 timeout + cat 模拟端口检测（更通用）
            if timeout 1 sh -c "cat < /dev/null > /dev/tcp/$$GATEWAY_IP/22" 2>/dev/null || \
               timeout 1 sh -c "cat < /dev/null > /dev/tcp/$$GATEWAY_IP/80" 2>/dev/null; then
              BROKER_IP1="$$GATEWAY_IP"
              echo "方法3成功: 网关可访问 -> $$BROKER_IP1"
            else
              echo "方法3失败: 网关 $$GATEWAY_IP 不可访问"
            fi
          fi

          # 方法 4: 使用 /proc/net/arp 查找网关 MAC 地址（Linux 特定）
          if [ -z "$$BROKER_IP1" ] && [ -f "/proc/net/arp" ]; then
            BROKER_IP1=$$(awk 'NR>1 && $$4!="00:00:00:00:00:00" {print $$1; exit}' /proc/net/arp)
            if [ -n "$$BROKER_IP1" ]; then
              echo "方法4成功: 从 ARP 表获取 -> $$BROKER_IP1"
            fi
          fi

          # 如果所有方法都失败，或检测到的 IP 不合理，需要用户手动配置
          if [ -z "$$BROKER_IP1" ]; then
            echo ""
            echo "❌ 无法自动检测宿主机 IP"
            echo "================================================"
            echo "容器网络和宿主机可能不在同一网段，请手动配置:"
            echo ""
            echo "1. 找到宿主机的局域网 IP:"
            echo "   - macOS: ifconfig en0 | grep 'inet '"
            echo "   - Linux: ip addr show | grep 'inet '"
            echo "   - Windows: ipconfig"
            echo ""
            echo "2. 创建 docker/.env 文件并设置:"
            echo "   BROKER_IP1=你的宿主机IP"
            echo ""
            echo "3. 重启 Broker:"
            echo "   docker compose -p patra -f docker/docker-compose.jobs.yaml restart rocketmq-broker"
            echo "================================================"
            echo ""
            BROKER_IP1="127.0.0.1"
            echo "使用临时默认值: $$BROKER_IP1 (仅用于容器内部测试)"
          else
            echo "✅ 自动检测完成: $$BROKER_IP1"
          fi
        else
          echo "使用环境变量提供的 BROKER_IP1: $$BROKER_IP1"
        fi

        # 追加 brokerIP1 配置
        echo "" >> /tmp/broker.conf
        echo "# Auto-configured broker IP for host access" >> /tmp/broker.conf
        echo "brokerIP1=$$BROKER_IP1" >> /tmp/broker.conf

        # 显示最终配置
        echo "=== Final broker.conf ==="
        cat /tmp/broker.conf
        echo "========================="

        # 启动 broker
        sh mqbroker --enable-proxy -c /tmp/broker.conf
    ports:
      - "10909:10909"         # remoting
      - "10911:10911"         # remoting
      - "10912:10912"         # HA
      - "7071:8080"           # proxy (HTTP)
      - "8081:8081"           # proxy (gRPC/HTTP2)
    volumes:
      - ${HOME}/.patra/docker/rocketmq/broker/logs:/home/rocketmq/logs
      - ${HOME}/.patra/docker/rocketmq/broker/store:/home/rocketmq/store
      - ${HOME}/.patra/docker/rocketmq/broker/conf/broker.conf:/home/rocketmq/rocketmq-5.3.1/conf/broker.conf:ro
    depends_on:
      rocketmq-namesrv:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/10911 && exec 3<>/dev/tcp/127.0.0.1/8081'" ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:2.1.0
    container_name: patra-rocketmq-dashboard
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    ports:
      - "4002:8082"           # Dashboard UI
    depends_on:
      rocketmq-namesrv:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8082/ >/dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  default:
    name: patra-net
