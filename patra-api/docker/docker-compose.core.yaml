version: "3.9"

# Core infrastructure services required for application runtime
# These services are essential and should always be running

services:
  mysql:
    image: mysql:8.0.36
    container_name: patra-mysql
    restart: unless-stopped
    ports: [ "13306:3306" ]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      TZ: Asia/Shanghai
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --lower_case_table_names=1
      --explicit_defaults_for_timestamp=ON
      --max_connections=300
    volumes:
      - ${HOME}/.patra/docker/mysql/data:/var/lib/mysql
      - ${HOME}/.patra/docker/mysql/conf.d:/etc/mysql/conf.d
      - ${HOME}/.patra/docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -uroot -p$$MYSQL_ROOT_PASSWORD -h 127.0.0.1 --silent" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.0.15
    container_name: patra-redis
    restart: unless-stopped
    ports: [ "16379:6379" ]
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    volumes:
      - ${HOME}/.patra/docker/redis/data:/data
      - ${HOME}/.patra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v3.0.3
    container_name: patra-nacos
    restart: unless-stopped
    environment:
      - MODE=standalone
      - TZ=Asia/Shanghai
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_TOKEN=wur4obqxgTEPKRgkbloX3m4Gx+uUuIuIsp6YjKrGgv0=
      - NACOS_AUTH_IDENTITY_KEY=patra
      - NACOS_AUTH_IDENTITY_VALUE=patra
    ports:
      - "4000:8080"
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ${HOME}/.patra/docker/nacos/logs:/home/nacos/logs
      - ${HOME}/.patra/docker/nacos/data:/home/nacos/data
    healthcheck:
      test: [ "CMD", "curl", "-fs", "http://localhost:8848/nacos/" ]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  default:
    name: patra-net
