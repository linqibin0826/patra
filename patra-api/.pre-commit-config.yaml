repos:
  # 1) Fast, language-agnostic hygiene checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=2000"]

  # 2) Java formatting — automated via fmt-maven-plugin in hooks below
  # Using com.spotify.fmt (Google Java Format) configured in patra-parent.
  # IntelliJ users should install the google-java-format plugin for IDE consistency.
  # Pre-commit hook runs fmt:format (auto-fixes), pre-push runs fmt:check (validation).

  # 3) Spelling checker for docs and code comments
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args:
          - "-S"
          - "target,*.min.js,*generated*,*.lock"
          - "-L"
          - "nd,te,crate,clas,AfterAll,renderIn"

  # 4) Secret scanning (no baseline required)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        args: ["protect", "--verbose", "--redact", "--staged"]

  # 5) Local Maven hooks for fast feedback on code changes
  - repo: local
    hooks:
      # ========== PRE-COMMIT STAGE (Fast feedback before commit) ==========

      # Fast compile of only the changed Maven modules at commit time
      # Auto-formats Java code with fmt-maven-plugin before compilation
      - id: mvn-compile-changed-modules
        name: mvn compile (changed modules)
        entry: scripts/git/mvn_compile_changed_modules.sh
        language: system
        pass_filenames: true
        files: "(pom\\.xml|.*\\.java)$"
        verbose: true

      # Validate hexagonal architecture rules with ArchUnit (commit time)
      # Ensures Domain layer stays pure Java with no framework dependencies
      # Enforces layer boundaries and naming conventions
      - id: mvn-archunit-changed-modules
        name: ArchUnit validation (changed modules)
        entry: scripts/git/mvn_archunit_changed_modules.sh
        language: system
        pass_filenames: true
        files: ".*\\.java$"
        verbose: true

      # ========== COMMIT-MSG STAGE (Validate commit message) ==========

      # Validate commit message format (Conventional Commits)
      # Format: <type>(<scope>): <subject>
      # Types: feat, fix, docs, style, refactor, test, chore, perf, ci, build
      - id: commit-msg-validation
        name: Commit message format validation
        entry: scripts/git/validate_commit_msg.sh
        language: system
        stages: [commit-msg]

      # ========== PRE-PUSH STAGE (Comprehensive checks before push) ==========

      # Run unit tests for changed modules on push (keeps commit-time fast)
      # Validates formatting compliance with fmt:check before running tests
      # Optionally enforces test coverage thresholds (set CHECK_COVERAGE=1)
      - id: mvn-test-changed-modules-on-push
        name: mvn test (changed modules on push)
        entry: scripts/git/mvn_test_changed_modules.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
        verbose: true

      # Run SpotBugs static analysis on changed modules (pre-push only)
      # Detects bugs, security vulnerabilities, and code quality issues
      # Reports: target/spotbugs/*.html
      # TEMPORARILY DISABLED: Re-enable after addressing remaining SpotBugs issues
      # - id: mvn-spotbugs-changed-modules
      #   name: SpotBugs static analysis (changed modules)
      #   entry: scripts/git/mvn_spotbugs_changed_modules.sh
      #   language: system
      #   pass_filenames: false
      #   stages: [pre-push]
      #   verbose: true
