# Phase 1: Safe default logging configuration
# These settings provide a baseline logging setup with no behavioral changes to existing services
# Dynamic log levels, sanitization, and advanced features will be added in Phase 2+

logging:
  # Default log levels
  level:
    root: INFO
    com.patra: INFO
    org.springframework: INFO
    org.apache: INFO
    com.alibaba: INFO
    io.lettuce: WARN
    org.mybatis: INFO

  # Logback configuration
  config: classpath:logback-spring.xml

  # Pattern configuration (Phase 1: basic format)
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [%thread] %-5level %logger{36} - %msg%n"

# Future configuration placeholders (will be implemented in Phase 2+)
patra:
  logging:
    # Phase 2: Trace context propagation settings
    trace:
      enabled: false

    # Phase 2: Log sanitization settings
    sanitization:
      enabled: false
      mode: MANUAL

    # Phase 2: Dynamic log level management via Nacos
    dynamic:
      enabled: false
