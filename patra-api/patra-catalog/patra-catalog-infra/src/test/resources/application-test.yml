# 测试环境配置

spring:
  # Flyway 配置 - 启用（使用 Flyway 迁移脚本初始化表结构）
  flyway:
    enabled: true
    baseline-on-migrate: true  # 首次运行时创建 baseline
    clean-disabled: false      # 测试环境允许 clean
    locations: classpath:db/migration  # 迁移脚本位置

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 打印 SQL 日志，方便调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 逻辑删除配置
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.patra.catalog: DEBUG
    org.testcontainers: INFO
