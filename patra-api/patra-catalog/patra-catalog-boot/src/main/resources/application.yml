# ============================================================================
# Patra Catalog Service - Main Configuration
# ============================================================================
# Catalog service manages medical literature classification systems,
# MeSH vocabulary, authors, affiliations, and journals.
# ============================================================================

# ----------------------------------------------------------------------------
# Server Configuration
# ----------------------------------------------------------------------------
server:
  port: 6300

# ----------------------------------------------------------------------------
# Spring Boot & Cloud Configuration
# ----------------------------------------------------------------------------
spring:
  application:
    name: patra-catalog
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Configuration imports (order matters: later configs override earlier ones)
  config:
    import:
      # Local error-handling configuration
      - "classpath:catalog-error-config.yaml"

  # Consul Service Discovery
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        health-check-interval: 10s
        health-check-path: /actuator/health
        instance-id: ${spring.application.name}:${random.value}

  # Database Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # URL, username, password are profile-specific (see application-dev.yml, application-prod.yml)
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000    # 30 seconds
      idle-timeout: 600000          # 10 minutes
      max-lifetime: 1800000         # 30 minutes

  # Flyway Database Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0.1.0

# ----------------------------------------------------------------------------
# Feign Client Configuration
# ----------------------------------------------------------------------------
feign:
  client:
    config:
      default:
        connectTimeout: 2000
        readTimeout: 5000

# ----------------------------------------------------------------------------
# XXL-Job Distributed Task Scheduler
# ----------------------------------------------------------------------------
xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://localhost:7070/xxl-job-admin}
    executor:
      ip: ${XXL_JOB_EXECUTOR_IP:host.docker.internal}
      # Log directory in centralized logs folder
      logpath: ${XXL_JOB_EXECUTOR_LOG_PATH:${PATRA_LOG_DIR:logs}/xxl-job/patra-catalog}
      logretentiondays: ${XXL_JOB_LOG_RETENTION_DAYS:30}

# ----------------------------------------------------------------------------
# Patra Catalog Service Configuration
# ----------------------------------------------------------------------------
patra:
  catalog:
    mesh:
      # MeSH Descriptor（主题词）XML 文件 URL - 版本号从文件名自动推断
      descriptor-url: https://nlmpubs.nlm.nih.gov/projects/mesh/MESH_FILES/xmlmesh/desc2025.xml
      # MeSH Qualifier（限定词）XML 文件 URL - 版本号从文件名自动推断
      qualifier-url: https://nlmpubs.nlm.nih.gov/projects/mesh/MESH_FILES/xmlmesh/qual2025.xml
    ror:
      # ROR（Research Organization Registry）机构数据 ZIP 文件 URL - 版本号从文件名自动推断
      # 最新版本下载地址：https://ror.readme.io/docs/data-dump
      download-url: https://zenodo.org/records/17953395/files/v2.0-2025-12-16-ror-data.zip?download=1

# ----------------------------------------------------------------------------
# Logging Configuration
# ----------------------------------------------------------------------------
logging:
  file:
    # Centralized log directory in project root
    path: ${PATRA_LOG_DIR:logs}

# ----------------------------------------------------------------------------
# Actuator & Monitoring Configuration
# ----------------------------------------------------------------------------
# 注意：Metrics 通过 OTel Agent + Micrometer Bridge 导出到 OTel Collector
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
