# ============================================================================
# Patra Catalog Service - Main Configuration
# ============================================================================
# Catalog service manages medical literature classification systems,
# MeSH vocabulary, authors, affiliations, and journals.
# ============================================================================

# ----------------------------------------------------------------------------
# Server Configuration
# ----------------------------------------------------------------------------
server:
  port: 6300

# ----------------------------------------------------------------------------
# Spring Boot & Cloud Configuration
# ----------------------------------------------------------------------------
spring:
  application:
    name: patra-catalog
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Configuration imports (order matters: later configs override earlier ones)
  config:
    import:
      # Local error-handling configuration
      - "classpath:catalog-error-config.yaml"

  # Consul Service Discovery
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        health-check-interval: 10s
        health-check-path: /actuator/health
        # 使用固定 instance-id，服务重启时覆盖旧注册，避免僵尸实例
        instance-id: ${spring.application.name}:${server.port}
        # 使用宿主机实际 IP 注册服务（Consul 容器和宿主机服务都能访问）
        prefer-ip-address: true
        # 指定服务发现返回的 scheme，解决 lb:// 协议与 JDK HttpClient 不兼容问题
        # 参考：https://github.com/spring-cloud/spring-cloud-commons/issues/1320
        scheme: http

  # Database Configuration
  datasource:
    driver-class-name: org.postgresql.Driver
    # URL, username, password are profile-specific (see application-dev.yml, application-prod.yml)
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000    # 30 seconds
      idle-timeout: 600000          # 10 minutes
      max-lifetime: 1800000         # 30 minutes

  # Flyway Database Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1.5.1

# ----------------------------------------------------------------------------
# Patra Configuration
# ----------------------------------------------------------------------------
patra:
  catalog:
    mesh:
      # MeSH Descriptor（主题词）XML 文件 URL - 版本号从文件名自动推断
      descriptor-url: https://nlmpubs.nlm.nih.gov/projects/mesh/MESH_FILES/xmlmesh/desc2026.xml
      # MeSH Qualifier（限定词）XML 文件 URL - 版本号从文件名自动推断
      qualifier-url: https://nlmpubs.nlm.nih.gov/projects/mesh/MESH_FILES/xmlmesh/qual2026.xml
    ror:
      # ROR（Research Organization Registry）机构数据 ZIP 文件 URL - 版本号从文件名自动推断
      # 最新版本下载地址：https://ror.readme.io/docs/data-dump
      download-url: https://zenodo.org/records/17953395/files/v2.0-2025-12-16-ror-data.zip?download=1
    scopus:
      api-key: ${SCOPUS_API_KEY:fac6c85f0e12c170753863467ee464d3}

linqibin:
  starter:
    rest-client:
      proxy:
        tunnel:
          # 默认启用隧道代理：LetPub 等外部爬取需经 Apache HttpClient 5 走青果隧道代理。
          # 如需临时禁用（例如本地无网络、跑单测、代理额度耗尽），设置环境变量
          # PROXY_TUNNEL_ENABLED=false 覆盖即可。
          enabled: ${PROXY_TUNNEL_ENABLED:true}
          # 使用 IP 而非域名，避免 Clash fake-ip DNS 劫持
          # 域名 tun-afbngw.qg.net 对应 IP，可通过 nslookup tun-afbngw.qg.net 8.8.8.8 验证
          host: 112.49.20.234
          port: 15057
          # 凭证必须通过环境变量提供；若未设置，启动期 Assert 会给出明确的中文错误提示
          auth-key: ${PROXY_AUTH_KEY:}
          auth-pwd: ${PROXY_AUTH_PWD:}
    http-interface:
      enabled: true
      connect-timeout: 2s
      read-timeout: 5s
      error-handling:
        problem-detail-enabled: true
        tolerant: true
      groups:
        registry:
          base-url: lb://patra-registry
          read-timeout: 10s

# ----------------------------------------------------------------------------
# XXL-Job Distributed Task Scheduler
# ----------------------------------------------------------------------------
xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://localhost:7070/xxl-job-admin}
    executor:
      ip: ${XXL_JOB_EXECUTOR_IP:host.docker.internal}  # Docker 容器中的 xxl-job-admin 需要通过此地址回调宿主机
      # Log directory in centralized logs folder
      logpath: ${XXL_JOB_EXECUTOR_LOG_PATH:${PATRA_LOG_DIR:logs}/xxl-job/patra-catalog}
      logretentiondays: ${XXL_JOB_LOG_RETENTION_DAYS:30}

# ----------------------------------------------------------------------------
# Logging Configuration
# ----------------------------------------------------------------------------
logging:
  file:
    # Centralized log directory in project root
    path: ${PATRA_LOG_DIR:logs}

# ----------------------------------------------------------------------------
# Actuator & Monitoring Configuration
# ----------------------------------------------------------------------------
# 注意：Metrics 通过 OTel Agent + Micrometer Bridge 导出到 OTel Collector
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
