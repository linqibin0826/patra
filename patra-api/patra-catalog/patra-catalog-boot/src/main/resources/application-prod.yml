# ========================================
# Production Environment Configuration
# ========================================
# This configuration is active when spring.profiles.active=prod
# All sensitive values are injected via environment variables

spring:
  config:
    activate:
      on-profile: prod

  # Production database (environment variables)
  datasource:
    url: ${CATALOG_DB_URL}
    username: ${CATALOG_DB_USERNAME}
    password: ${CATALOG_DB_PASSWORD}

  # Production Redis (environment variables)
  data:
    redis:
      url: ${CATALOG_REDIS_URL}

# Production logging configuration
logging:
  level:
    com.patra: INFO
    com.patra.catalog: INFO

# Spring Batch 独立数据源（与业务数据库隔离）
patra:
  # 通用异步线程池配置
  async:
    enabled: true
    pools:
      cache-upload:         # MeSH 缓存上传等 I/O 操作
        core-size: 2
        max-size: 4
        queue-capacity: 50
        thread-name-prefix: cache-upload-

  batch:
    datasource:
      url: ${BATCH_DB_URL}
      username: ${BATCH_DB_USERNAME}
      password: ${BATCH_DB_PASSWORD}

  # 对象存储配置（环境变量注入）
  object-storage:
    active-provider: ${OBJECT_STORAGE_PROVIDER:minio}
    providers:
      minio:
        endpoint: ${MINIO_ENDPOINT}
        access-key: ${MINIO_ACCESS_KEY}
        secret-key: ${MINIO_SECRET_KEY}
        bucket: ${MINIO_BUCKET:patra-catalog-cache}

  # MeSH 文件缓存配置（生产环境默认禁用，按需启用）
  catalog:
    mesh-cache:
      enabled: ${MESH_CACHE_ENABLED:false}
      bucket: ${MESH_CACHE_BUCKET:patra-catalog-cache}
      key-prefix: ${MESH_CACHE_KEY_PREFIX:mesh}
