server:
  port: 8083

spring:
  application:
    name: patra-egress-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - "classpath:egress-error-config.yaml"
      - "optional:nacos:${spring.application.name}-${spring.profiles.active:dev}.yaml?group=${NACOS_CONFIG_GROUP:${NACOS_GROUP:DEFAULT_GROUP}}&namespace=${NACOS_NAMESPACE_ID:${NACOS_NAMESPACE:public}}"
      - "optional:nacos:papertrace-${spring.profiles.active:dev}.yaml?group=${NACOS_CONFIG_GROUP:${NACOS_GROUP:DEFAULT_GROUP}}&namespace=${NACOS_NAMESPACE_ID:${NACOS_NAMESPACE:public}}"
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE_ID:${NACOS_NAMESPACE:public}}
        group: ${NACOS_DISCOVERY_GROUP:${NACOS_GROUP:DEFAULT_GROUP}}

patra:
  egress:
    global:
      rate-limit: ${EGRESS_GLOBAL_RATE_LIMIT:1000}
    resilience:
      max:
        timeout-seconds: 60
        max-retries: 5
        retry-backoff-seconds: 10
        rate-limit: 1000
        circuit-breaker-threshold: 20
        circuit-breaker-window-seconds: 120
        response-header-whitelist:
          - "Content-Type"
          - "Content-Length"
          - "X-RateLimit-Limit"
          - "X-RateLimit-Remaining"
          - "X-RateLimit-Reset"
          - "Retry-After"
          - "ETag"
          - "Last-Modified"
      default:
        timeout-seconds: 30
        max-retries: 3
        retry-backoff-seconds: 1
        rate-limit: 100
        circuit-breaker-threshold: 10
        circuit-breaker-window-seconds: 60
        response-header-whitelist:
          - "Content-Type"
          - "Content-Length"
          - "X-RateLimit-Limit"
          - "X-RateLimit-Remaining"
          - "X-RateLimit-Reset"
          - "Retry-After"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.patra.egress: INFO
    org.springframework.web: INFO
    org.springframework.cloud: INFO
  pattern:
    console: "[TID: %X{traceId:-N/A}] %d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%-15.15t] %-40.40logger{39} : %m%n"
