# Grafana 配置
# 统一可视化平台

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[server]
protocol = http
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[database]
type = sqlite3
path = grafana.db

[session]
provider = file
provider_config = sessions

[analytics]
reporting_enabled = false
check_for_updates = true
check_for_plugin_updates = true

[security]
admin_user = admin
admin_password = patra123
disable_gravatar = true

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = false

[log]
mode = console
level = info

[log.console]
format = text

[unified_alerting]
enabled = true

[alerting]
enabled = false

[feature_toggles]
# 启用 Tempo 搜索和 TraceQL
tempoSearch = true
tempoBackendSearch = true
tempoServiceGraph = true
traceqlEditor = true
# 启用 Explore 中的 Metrics
explore = true
# 启用 Correlations（信号关联）
correlations = true
