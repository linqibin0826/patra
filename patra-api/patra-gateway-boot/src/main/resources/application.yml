# ============================================================================
# Patra API Gateway - Main Configuration
# ============================================================================
# This gateway serves as the unified entry point for all Patra services.
# Routes are configured below with Consul-based service discovery.
# ============================================================================

# ----------------------------------------------------------------------------
# Server Configuration
# ----------------------------------------------------------------------------
server:
  port: 9528

# ----------------------------------------------------------------------------
# Spring Boot & Cloud Configuration
# ----------------------------------------------------------------------------
spring:
  application:
    name: patra-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Cloud Configuration
  cloud:
    # Consul Service Discovery
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        health-check-interval: 10s
        health-check-path: /actuator/health
        # 使用固定 instance-id，服务重启时覆盖旧注册，避免僵尸实例
        instance-id: ${spring.application.name}:${server.port}
        # 使用宿主机实际 IP 注册服务（Consul 容器和宿主机服务都能访问）
        prefer-ip-address: true
        # 指定服务注册的 scheme，解决 lb:// 协议与 HttpClient 不兼容问题
        scheme: http

    # Gateway Route Configuration
    # Routes requests to downstream microservices using load balancing
    gateway:
      server:
        webflux:
          routes:
            # Ingest Service Route
            # Example: /patra-ingest/plans -> lb://patra-ingest/plans
            - id: patra-ingest
              uri: lb://patra-ingest
              predicates:
                - Path=/patra-ingest/**
              filters:
                - StripPrefix=1

            # Registry Service Route
            # Example: /patra-registry/provenance -> lb://patra-registry/provenance
            - id: patra-registry
              uri: lb://patra-registry
              predicates:
                - Path=/patra-registry/**
              filters:
                - StripPrefix=1

            # Catalog Service Route
            # Example: /patra-catalog/venues -> lb://patra-catalog/venues
            - id: patra-catalog
              uri: lb://patra-catalog
              predicates:
                - Path=/patra-catalog/**
              filters:
                - StripPrefix=1

# ----------------------------------------------------------------------------
# API Documentation Aggregation
# ----------------------------------------------------------------------------
# 通过 Gateway 聚合各微服务的 OpenAPI 文档
# 各服务的 /v3/api-docs 请求通过已有路由代理到下游
scalar:
  sources:
    - url: /patra-catalog/v3/api-docs
      title: Catalog Service
      slug: catalog
    - url: /patra-registry/v3/api-docs
      title: Registry Service
      slug: registry
    - url: /patra-ingest/v3/api-docs
      title: Ingest Service
      slug: ingest

# ----------------------------------------------------------------------------
# Logging Configuration
# ----------------------------------------------------------------------------
logging:
  file:
    # Centralized log directory in project root
    path: ${PATRA_LOG_DIR:logs}
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.loadbalancer: INFO

# ----------------------------------------------------------------------------
# Actuator & Monitoring Configuration
# ----------------------------------------------------------------------------
# 注意：Metrics 通过 OTel Agent + Micrometer Bridge 导出到 OTel Collector
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
