# ========================================
# Patra Registry Service Configuration
# ========================================
# Single Source of Truth for provenance metadata, operational configurations,
# expressions, and dictionaries. Other services query this via Feign RPC.

# ========================================
# Server Configuration
# ========================================
server:
  port: 6000

# ========================================
# Spring Application Configuration
# ========================================
spring:
  application:
    name: patra-registry

  # Active profile (dev/prod), overridable via environment variable
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Configuration imports (order matters: later configs override earlier ones)
  config:
    import:
      # Local error-handling configuration
      - "classpath:registry-error-config.yaml"

  # ========================================
  # Consul Service Discovery
  # ========================================
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        health-check-interval: 10s
        health-check-path: /actuator/health
        instance-id: ${spring.application.name}:${random.value}

  # ========================================
  # JSON Serialization Configuration
  # ========================================
  # 注意：Spring Boot 4.0 + Jackson 3.x 中 write-dates-as-timestamps 和 fail-on-unknown-properties
  # 已不再是有效的配置属性。Jackson 3.x 默认使用 ISO-8601 格式序列化日期，
  # 未知属性的处理通过 ObjectMapper 配置或 @JsonIgnoreProperties 注解控制。

  # ========================================
  # Database Configuration
  # ========================================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # URL, username, password are profile-specific (see application-dev.yml, application-prod.yml)
    hikari:
      # Connection pool settings
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000    # 30 seconds
      idle-timeout: 600000          # 10 minutes
      max-lifetime: 1800000         # 30 minutes

  # ========================================
  # Flyway Database Migration
  # ========================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Allow Flyway to baseline existing databases
    baseline-on-migrate: true
    baseline-version: 0.1.0

# ========================================
# Logging Configuration
# ========================================
logging:
  file:
    # Centralized log directory in project root
    path: ${PATRA_LOG_DIR:logs}

# ========================================
# Actuator & Management Endpoints
# ========================================
# 注意：Metrics 通过 OTel Agent + Micrometer Bridge 导出到 OTel Collector
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
