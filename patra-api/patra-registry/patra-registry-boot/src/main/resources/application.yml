# ========================================
# Patra Registry Service Configuration
# ========================================
# Single Source of Truth for provenance metadata, operational configurations,
# expressions, and dictionaries. Other services query this via HTTP Interface.

# ========================================
# Server Configuration
# ========================================
server:
  port: 6000
  # Tomcat Keep-Alive 配置 - 防止客户端遇到 stale connection 错误
  # 参考: https://github.com/spring-projects/spring-boot/issues/23539
  tomcat:
    keep-alive-timeout: 120s       # Keep-Alive 超时（应大于客户端超时）
    max-keep-alive-requests: 1000  # 单连接最大请求数

# ========================================
# Spring Application Configuration
# ========================================
spring:
  application:
    name: patra-registry

  # Active profile (dev/prod), overridable via environment variable
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Configuration imports (order matters: later configs override earlier ones)
  config:
    import:
      # Local error-handling configuration
      - "classpath:registry-error-config.yaml"

  # ========================================
  # Nacos Service Discovery
  # ========================================
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        server-addr: ${NACOS_HOST:${PATRA_INFRA_HOST:localhost}}:${NACOS_PORT:8848}
        service: ${spring.application.name}
        # 显式 false：SCA 2025.1.0.0 默认 true 会让 nacos 3.x gRPC 异步握手未完成时
        # 同步 register 的 -401 Client-not-connected 直接 abort 整个应用启动
        fail-fast: false

  # ========================================
  # JSON Serialization Configuration
  # ========================================
  # 注意：Spring Boot 4.0 + Jackson 3.x 中 write-dates-as-timestamps 和 fail-on-unknown-properties
  # 已不再是有效的配置属性。Jackson 3.x 默认使用 ISO-8601 格式序列化日期，
  # 未知属性的处理通过 ObjectMapper 配置或 @JsonIgnoreProperties 注解控制。

  # ========================================
  # Database Configuration
  # ========================================
  datasource:
    driver-class-name: org.postgresql.Driver
    # URL, username, password are profile-specific (see application-dev.yml, application-prod.yml)
    hikari:
      # Connection pool settings
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000    # 30 seconds
      idle-timeout: 600000          # 10 minutes
      max-lifetime: 1800000         # 30 minutes

  # ========================================
  # Flyway Database Migration
  # ========================================
  flyway:
    enabled: true
    locations: classpath:db/migration

# ========================================
# Logging Configuration
# ========================================
logging:
  file:
    # Centralized log directory in project root
    path: ${PATRA_LOG_DIR:logs}

# ========================================
# Actuator & Management Endpoints
# ========================================
# 注意：Metrics 通过 OTel Agent + Micrometer Bridge 导出到 OTel Collector
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
