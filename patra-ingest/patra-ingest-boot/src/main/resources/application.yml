server:
  port: 6100

spring:
  application:
    name: patra-ingest
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      # Local configuration files (error handling and message queue)
      - "classpath:ingest-error-config.yaml"
      - "classpath:ingest-rocketmq.yaml"
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        server-addr: ${NACOS_HOST:${PATRA_INFRA_HOST:localhost}}:${NACOS_PORT:8848}
        service: ${spring.application.name}
        # 显式 false：SCA 2025.1.0.0 默认 true 会让 nacos 3.x gRPC 异步握手未完成时
        # 同步 register 的 -401 Client-not-connected 直接 abort 整个应用启动
        fail-fast: false
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration

# HTTP Interface 客户端配置（替代 Feign）
linqibin:
  starter:
    http-interface:
      enabled: true
      connect-timeout: 2s
      read-timeout: 5s
      error-handling:
        problem-detail-enabled: true
        tolerant: true
      groups:
        registry:
          base-url: lb://patra-registry
          read-timeout: 10s
        storage:
          base-url: lb://patra-object-storage
          read-timeout: 60s

patra:
  ingest:
    exec:
      # Lease time-to-live in seconds for execution lock
      lease-ttl-seconds: ${INGEST_LEASE_TTL:60}
      # Heartbeat interval to maintain lease
      heartbeat-interval-seconds: ${INGEST_HEARTBEAT_INTERVAL:20}
    outbox-relay:
      enabled: true
      # Number of outbox records to process per batch
      batch-size: 200
      # Duration to hold relay execution lease (ISO-8601 format)
      lease-duration: PT30S

xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://localhost:7070/xxl-job-admin}
    executor:
      ip: ${XXL_JOB_EXECUTOR_IP:host.docker.internal}  # Docker 容器中的 xxl-job-admin 需要通过此地址回调宿主机
      # Log directory in centralized logs folder
      logpath: ${XXL_JOB_EXECUTOR_LOG_PATH:${PATRA_LOG_DIR:logs}/xxl-job/patra-ingest}
      logretentiondays: ${XXL_JOB_LOG_RETENTION_DAYS:30}

task:
  execution:
    lease:
      # Task execution lease duration in seconds
      duration: ${TASK_EXECUTION_LEASE_DURATION:60}
      # Lease renewal interval in seconds
      renewal-interval: ${TASK_EXECUTION_LEASE_RENEWAL_INTERVAL:20}
    heartbeat:
      # Number of consecutive heartbeat failures before task is considered dead
      failure-threshold: ${TASK_EXECUTION_HEARTBEAT_FAILURE_THRESHOLD:3}
    # When true, fail immediately on first error instead of continuing
    fail-fast: ${TASK_EXECUTION_FAIL_FAST:false}

logging:
  file:
    # Centralized log directory in project root
    path: ${PATRA_LOG_DIR:logs}

# ----------------------------------------------------------------------------
# Actuator & Monitoring Configuration
# ----------------------------------------------------------------------------
# 注意：Metrics 通过 OTel Agent + Micrometer Bridge 导出到 OTel Collector
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
