# Development profile overrides
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://127.0.0.1:13306/patra_ingest?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&rewriteBatchedStatements=true
    username: root
    password: 123456
  data:
    redis:
      url: redis://localhost:16379

expr:
  strict: false
  multi:
    repeat-enabled: false

# 可观测性：开箱即用（零配置）
# - Tracing/Logging: OTel Agent 自动处理
# - Metrics: applicationName 自动取 spring.application.name，environment 自动取 spring.profiles.active

patra:
  expr:
    compiler:
      enabled: true
      query-param-bridge:
        enabled: true
      max-query-length: 0
      warn-param-count: 0
      max-param-count: 0
  object-storage:
    active-provider: minio
    providers:
      minio:
        endpoint: http://localhost:19000
        access-key: ${MINIO_ACCESS_KEY:minioadmin}
        secret-key: ${MINIO_SECRET_KEY:minioadmin123}
        bucket: dev-ingest
    retry:
      max-attempts: 3
      wait-duration: 1000

logging:
  level:
    com.patra: DEBUG
    com.patra.starter.expr.compiler: DEBUG
