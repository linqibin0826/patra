server:
  port: 6100

spring:
  application:
    name: patra-ingest
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  config:
    import:
      - "classpath:ingest-error-config.yaml"
      - "classpath:ingest-mq-config.yaml"
      - "optional:nacos:patra-ingest.yaml?group=DEFAULT_GROUP&namespace=public"
      - "optional:nacos:patra.yaml?group=DEFAULT_GROUP&namespace=public"
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  datasource: # JDBC URL for the ingest database
    # - 3306 is the default MySQL port
    # - Replace my_database with the schema name for this environment
    # - ?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo keeps encoding and timezone aligned (recommended)
    url: jdbc:mysql://127.0.0.1:13306/patra_ingest?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    # Database username
    username: root
    # Database password
    password: 123456
    # Explicit JDBC driver (Spring Boot can usually infer this automatically)
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP connection pool tuning (defaults are usually sufficient; override only when necessary)
    hikari:
      # Maximum number of connections in the pool
      maximum-pool-size: 10
      # Minimum number of idle connections to retain
      minimum-idle: 5
      # Maximum wait time for a connection request in milliseconds
      connection-timeout: 30000
      # Maximum idle time for a pooled connection in milliseconds
      idle-timeout: 600000
      # Maximum lifetime for a pooled connection in milliseconds
      max-lifetime: 1800000
  flyway: # Flyway migration settings (enabled by default when flyway-core is on the classpath)
    enabled: true
    # Locations for SQL migration scripts; comma separate multiple paths (defaults to this path)
    locations: classpath:db/migration
    # Automatically baseline when migrations discover a non-empty schema (useful for existing deployments)
    baseline-on-migrate: true
    # Baseline version; migrations at or below this value are ignored
    baseline-version: 0.1.0
  data:
    redis:
      url: redis://localhost:16379

# Papertrace ingest execution settings
papertrace:
  ingest:
    exec:
      # Lease TTL in seconds (defaults to 60)
      lease-ttl-seconds: ${INGEST_LEASE_TTL:60}
      # Heartbeat interval in seconds (defaults to TTL / 3)
      heartbeat-interval-seconds: ${INGEST_HEARTBEAT_INTERVAL:20}

# Task execution engine configuration
task:
  execution:
    # Lease handling
    lease:
      # Lease duration in seconds (defaults to 60)
      duration: ${TASK_EXECUTION_LEASE_DURATION:60}
      # Lease renewal cadence in seconds (defaults to 20; aim for ~duration / 3)
      renewal-interval: ${TASK_EXECUTION_LEASE_RENEWAL_INTERVAL:20}
    # Heartbeat monitoring
    heartbeat:
      # Consecutive heartbeat failures that trigger a lease validation (default 3)
      failure-threshold: ${TASK_EXECUTION_HEARTBEAT_FAILURE_THRESHOLD:3}
    # Batch execution safeguards
    max-batches: ${TASK_EXECUTION_MAX_BATCHES:1000}  # Upper bound on batches processed per run
    fail-fast: ${TASK_EXECUTION_FAIL_FAST:false}     # Abort immediately when a batch fails
