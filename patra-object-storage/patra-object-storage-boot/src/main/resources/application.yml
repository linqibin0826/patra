server:
  port: 6200

spring:
  application:
    name: patra-object-storage
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        service: ${spring.application.name}
        # 显式 false：SCA 2025.1.0.0 默认 true 会让 nacos 3.x gRPC 异步握手未完成时
        # 同步 register 的 -401 Client-not-connected 直接 abort 整个应用启动
        fail-fast: false
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  file:
    # Centralized log directory in project root
    path: ${PATRA_LOG_DIR:logs}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
