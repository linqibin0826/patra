spring:
  # dev 场景：用 TAILSCALE_IP 注册，确保跨主机服务发现拿到的 IP 可达。
  cloud:
    nacos:
      discovery:
        ip: ${TAILSCALE_IP:}
  datasource:
    url: ${STORAGE_DB_URL:jdbc:postgresql://${PATRA_INFRA_HOST:127.0.0.1}:15432/patra_storage}
    username: ${STORAGE_DB_USERNAME:postgres}
    password: ${STORAGE_DB_PASSWORD:123456}

logging:
  file:
    path: ${PATRA_LOG_DIR:./logs}/patra-object-storage
  level:
    dev.linqibin.patra.objectstorage: INFO
