# ================================================================
# 配置验证清单
# ================================================================

# ✅ 检查项目：
# [ ] application-name 已正确配置
# [ ] environment 已设置（dev/test/prod）
# [ ] region 和 cluster 已配置（生产环境）
# [ ] 采样率已根据环境调整
# [ ] 公共标签已添加（service, team 等）
# [ ] Actuator 端点已正确暴露
# [ ] SkyWalking OAP 地址正确
# [ ] 日志格式包含 traceId
# [ ] 慢操作阈值已根据业务调整

# ================================================================
# 性能优化配置
# ================================================================

# 高流量服务（如 Gateway）优化配置：
---
patra:
  observability:
    tracing:
      sampling-rate: 0.01  # 1% 采样

    metrics:
      step: 30s  # 增加导出频率以减少内存占用

    handlers:
      logging:
        enabled: false  # 禁用日志 Handler 以减少开销
      performance:
        enabled: false  # 禁用性能 Handler

management:
  metrics:
    enable:
      jvm.gc.pause: false  # 禁用不需要的 JVM 指标
      logback.events: false

# ================================================================
# 故障排查配置
# ================================================================

# 启用详细日志以排查问题：
---
logging:
  level:
    org.apache.skywalking: DEBUG
    io.micrometer: DEBUG
    com.patra.starter.observability: DEBUG

# 启用 Spring Boot Actuator 的更多端点：
management:
  endpoints:
    web:
      exposure:
        include: "*"  # 暴露所有端点（仅用于故障排查）

# ================================================================
# 结束
# ================================================================
