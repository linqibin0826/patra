# ================================================================
# Patra 可观测性配置示例
# ================================================================
# 本文件提供了 patra-spring-boot-starter-observability 的完整配置示例
# 包含开发、测试、生产环境的不同配置
# ================================================================

# ================================================================
# 开发环境配置（application-dev.yml）
# ================================================================
---
spring:
  profiles: dev
  application:
    name: patra-ingest  # 示例服务名

# Patra 可观测性配置
patra:
  observability:
    # 全局开关
    enabled: true

    # 应用标识
    application-name: ${spring.application.name}
    environment: dev
    region: local
    cluster: dev-cluster

    # 指标配置
    metrics:
      enabled: true
      prefix: ""  # 可选前缀，默认为空
      step: 60s   # 导出间隔

      # 公共标签（自动添加到所有指标）
      common-tags:
        service: ingest
        team: data-ingestion
        version: ${project.version:dev}

      # SkyWalking Meter Registry
      skywalking:
        enabled: true
        oap-address: skywalking-oap:11800

      # Prometheus Registry
      prometheus:
        enabled: true
        enable-exemplars: true  # 启用 Exemplars（与 Tracing 关联）

    # 追踪配置
    tracing:
      enabled: true
      sampling-rate: 1.0  # 开发环境 100% 采样

      # Baggage 传播字段
      baggage-fields:
        - X-Request-Id
        - X-Correlation-Id
        - X-User-Id

      # 追踪 Header 名称
      header-names:
        - X-Trace-ID
        - X-B3-TraceId
        - traceparent

    # 日志配置
    logging:
      enabled: true
      include-trace-id: true
      pattern: "[%tid] [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

    # ObservationHandler 配置
    handlers:
      # 日志 Handler
      logging:
        enabled: true
        log-level: DEBUG

      # 性能 Handler
      performance:
        enabled: true
        slow-threshold: 1s  # 开发环境更严格的慢操作阈值

      # 告警 Handler（未来扩展）
      alerting:
        enabled: false

# Spring Boot Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,configprops
      base-path: /actuator

  endpoint:
    health:
      show-details: always  # 开发环境显示详细健康信息

  # 启用 @Observed 注解扫描
  observations:
    annotations:
      enabled: true

  # Metrics 配置
  metrics:
    # 分布配置（Histogram/Percentile）
    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true

  # Tracing 配置（如果使用 Micrometer Tracing）
  tracing:
    sampling:
      probability: 1.0

    # Baggage 传播
    baggage:
      correlation:
        enabled: true
      remote-fields: ${patra.observability.tracing.baggage-fields}

# Logging 配置
logging:
  pattern:
    # 日志格式（包含 traceId）
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%tid] [${spring.application.name},%X{traceId:-},%X{spanId:-}] [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.patra: DEBUG
    org.apache.skywalking: DEBUG
    io.micrometer: DEBUG

# ================================================================
# 测试环境配置（application-test.yml）
# ================================================================
---
spring:
  profiles: test
  application:
    name: patra-ingest

patra:
  observability:
    enabled: true
    application-name: ${spring.application.name}
    environment: test
    region: cn-east-1
    cluster: test-cluster

    metrics:
      common-tags:
        service: ingest
        team: data-ingestion
        version: ${project.version}

    tracing:
      sampling-rate: 0.5  # 测试环境 50% 采样

    handlers:
      performance:
        slow-threshold: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: when-authorized

  tracing:
    sampling:
      probability: 0.5

logging:
  level:
    root: INFO
    com.patra: DEBUG
    org.apache.skywalking: INFO

# ================================================================
# 生产环境配置（application-prod.yml）
# ================================================================
---
spring:
  profiles: prod
  application:
    name: patra-ingest

patra:
  observability:
    enabled: true
    application-name: ${spring.application.name}
    environment: prod
    region: ${REGION:cn-east-1}  # 从环境变量获取
    cluster: ${CLUSTER_NAME:patra-prod-cluster}

    metrics:
      common-tags:
        service: ingest
        team: data-ingestion
        version: ${project.version}

      skywalking:
        oap-address: ${SKYWALKING_OAP_ADDRESS:skywalking-oap:11800}

    tracing:
      sampling-rate: ${TRACING_SAMPLING_RATE:0.1}  # 生产环境 10% 采样（可通过环境变量调整）

    handlers:
      performance:
        enabled: true
        slow-threshold: 3s  # 生产环境慢操作阈值

      alerting:
        enabled: false  # 未来启用

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus  # 生产环境不暴露敏感端点

  endpoint:
    health:
      show-details: when-authorized

  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_RATE:0.1}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%tid] [${spring.application.name},%X{traceId:-},%X{spanId:-}] [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: WARN
    com.patra: INFO
    org.apache.skywalking: WARN

# ================================================================
# 特定服务的自定义配置示例
# ================================================================

# ----------------
# patra-catalog-boot（Catalog 服务）
# ----------------
---
spring:
  application:
    name: patra-catalog

patra:
  observability:
    metrics:
      common-tags:
        service: catalog
        team: data-catalog
        module: mesh-import

    tracing:
      sampling-rate: 0.2  # Catalog 服务采样率 20%（导入任务较多）

# ----------------
# patra-gateway-boot（API Gateway）
# ----------------
---
spring:
  application:
    name: patra-gateway

patra:
  observability:
    metrics:
      common-tags:
        service: gateway
        team: platform
        role: api-gateway

    tracing:
      sampling-rate: 0.05  # Gateway 采样率 5%（流量巨大）

# ----------------
# patra-registry-boot（Registry 服务）
# ----------------
---
spring:
  application:
    name: patra-registry

patra:
  observability:
    metrics:
      common-tags:
        service: registry
        team: data-governance
        type: metadata

    tracing:
      sampling-rate: 1.0  # Registry 100% 采样（流量较小）

# ================================================================
# 环境变量配置（Docker Compose / Kubernetes）
# ================================================================

# Docker Compose 环境变量示例：
# ENVIRONMENT=prod
# REGION=cn-east-1
# CLUSTER_NAME=patra-prod-cluster
# TRACING_SAMPLING_RATE=0.1
# SKYWALKING_OAP_ADDRESS=skywalking-oap:11800
# SW_AGENT_NAME=patra-ingest
# SW_AGENT_COLLECTOR_BACKEND_SERVICES=skywalking-oap:11800
# SW_AGENT_SAMPLE=3

# Kubernetes ConfigMap 示例：
# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: observability-config
# data:
#   ENVIRONMENT: "prod"
#   REGION: "cn-east-1"
#   CLUSTER_NAME: "patra-k8s-cluster"
#   TRACING_SAMPLING_RATE: "0.1"

# ================================================================
# 最小化配置（仅启用基本功能）
# ================================================================
---
spring:
  application:
    name: my-service

patra:
  observability:
    enabled: true  # 其他使用默认值

# ================================================================
# 完全禁用可观测性（紧急回滚）
# ================================================================
---
patra:
  observability:
    enabled: false

