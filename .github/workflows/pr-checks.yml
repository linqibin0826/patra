name: PR 检查

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  JAVA_VERSION: '25'
  MAVEN_OPTS: -Xmx2g -Xms512m

jobs:
  # ==================== PR 信息检查 ====================
  pr-info:
    name: 📝 PR 信息检查
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: 📋 检查 PR 标题
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR 标题: $PR_TITLE"

          # 检查标题长度
          if [ ${#PR_TITLE} -lt 10 ]; then
            echo "❌ PR 标题过短（少于 10 个字符）"
            exit 1
          fi

          # 检查是否包含常见前缀（可选）
          if [[ $PR_TITLE =~ ^(feat|fix|docs|refactor|test|chore|perf|style|ci): ]]; then
            echo "✅ PR 标题格式正确"
          else
            echo "⚠️ 建议使用常规提交格式: feat|fix|docs|refactor|test|chore: 描述"
          fi

      - name: 📄 检查 PR 描述
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          if [ -z "$PR_BODY" ] || [ ${#PR_BODY} -lt 20 ]; then
            echo "⚠️ PR 描述为空或过短，建议添加详细说明"
          else
            echo "✅ PR 描述已填写"
          fi

  # ==================== 快速测试（阻塞合并） ====================
  quick-validation:
    name: ⚡ 快速验证
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史，用于变更检测

      - name: ☕ 设置 Java 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔍 检测变更的模块
        id: changes
        run: |
          # 获取变更文件列表
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "变更文件:"
          echo "$CHANGED_FILES"

          # 检测是否修改了 patra-ingest 模块
          if echo "$CHANGED_FILES" | grep -q "^patra-ingest/"; then
            echo "ingest_changed=true" >> $GITHUB_OUTPUT
          else
            echo "ingest_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 🧪 运行快速测试
        if: steps.changes.outputs.ingest_changed == 'true'
        run: |
          cd patra-ingest/patra-ingest-boot
          mvn test -Pfast-tests -B -V

      - name: ⏭️ 跳过测试（无相关变更）
        if: steps.changes.outputs.ingest_changed == 'false'
        run: |
          echo "✅ patra-ingest 模块无变更，跳过快速测试"

  # ==================== 完整测试（建议但不阻塞） ====================
  full-tests:
    name: 🔬 完整测试（建议）
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    continue-on-error: false # 失败会标记但不阻塞

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 Java 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 🐳 配置 Testcontainers
        run: |
          mkdir -p ~/.testcontainers
          echo "testcontainers.reuse.enable=false" > ~/.testcontainers.properties

      - name: 🧪 运行完整测试
        run: |
          cd patra-ingest/patra-ingest-boot
          mvn test -Pall-tests -B -V
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: 📊 生成测试覆盖率报告
        if: always()
        run: |
          cd patra-ingest/patra-ingest-boot
          mvn jacoco:report -B

      - name: 📈 上传覆盖率到 Codecov（可选）
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: |
            **/target/site/jacoco/jacoco.xml
          flags: integration-tests
          name: patra-ingest-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: 💬 评论测试结果到 PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = '${{ job.status }}' === 'success' ? '✅ 通过' : '❌ 失败';
            const body = `
            ## 🧪 测试结果

            - **快速测试**: ⏭️ 查看 quick-validation job
            - **完整测试**: ${testResult}

            📊 详细报告请查看 [Actions 页面](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            // 查找之前的评论并更新
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('🧪 测试结果')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # ==================== 代码审查辅助 ====================
  code-review-hints:
    name: 🤖 代码审查提示
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 分析代码变更
        id: analyze
        run: |
          # 统计变更行数
          CHANGED_LINES=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | grep -oP '\d+(?= insertion)' || echo 0)
          DELETED_LINES=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | grep -oP '\d+(?= deletion)' || echo 0)

          echo "changed_lines=$CHANGED_LINES" >> $GITHUB_OUTPUT
          echo "deleted_lines=$DELETED_LINES" >> $GITHUB_OUTPUT

          # 检查是否有大型 PR
          TOTAL_CHANGES=$((CHANGED_LINES + DELETED_LINES))
          if [ $TOTAL_CHANGES -gt 500 ]; then
            echo "large_pr=true" >> $GITHUB_OUTPUT
          else
            echo "large_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: 💬 提示大型 PR
        if: steps.analyze.outputs.large_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ **大型 PR 提示**

              此 PR 包含较多代码变更（${{ steps.analyze.outputs.changed_lines }}+ 行）。

              建议：
              - 考虑拆分为多个小 PR，便于审查
              - 确保每个变更都有对应的测试
              - 在 PR 描述中详细说明变更原因
              `
            });

  # ==================== 汇总检查 ====================
  pr-checks-summary:
    name: 📋 PR 检查汇总
    runs-on: ubuntu-latest
    if: always()
    needs: [pr-info, quick-validation, full-tests]

    steps:
      - name: 📊 汇总结果
        run: |
          echo "📝 PR 信息: ${{ needs.pr-info.result }}"
          echo "⚡ 快速验证: ${{ needs.quick-validation.result }}"
          echo "🔬 完整测试: ${{ needs.full-tests.result }}"

      - name: ✅ 检查必需项
        if: |
          needs.quick-validation.result != 'success' &&
          needs.quick-validation.result != 'skipped'
        run: |
          echo "❌ 快速验证失败，无法合并"
          exit 1

      - name: 🎉 可以合并
        if: |
          (needs.quick-validation.result == 'success' ||
           needs.quick-validation.result == 'skipped') &&
          needs.full-tests.result == 'success'
        run: |
          echo "✅ 所有检查通过，可以合并！"
