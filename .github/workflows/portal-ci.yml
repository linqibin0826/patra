name: Portal CI

permissions:
  contents: read

# paths 限定 patra-portal/** 触发，非 portal 变更不触发本 workflow。
# 后续如需将 patra-portal/** 从 ci.yml 的 paths-ignore 中排除，
# 可避免 portal-only PR 同时触发后端 Gradle 全量构建。

on:
  push:
    branches: [main]
    paths:
      - 'patra-portal/**'
      - '.github/workflows/portal-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'patra-portal/**'
      - '.github/workflows/portal-ci.yml'
  workflow_dispatch:

concurrency:
  group: portal-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: patra-portal

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: ⚙️ Setup Node (reads .nvmrc → 24)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'patra-portal/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: patra-portal/pnpm-lock.yaml

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint (Biome)
        run: pnpm lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: ⚙️ Setup Node (reads .nvmrc → 24)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'patra-portal/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: patra-portal/pnpm-lock.yaml

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔎 Type check (tsc --noEmit)
        run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: ⚙️ Setup Node (reads .nvmrc → 24)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'patra-portal/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: patra-portal/pnpm-lock.yaml

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Test (Vitest)
        run: pnpm test

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: ⚙️ Setup Node (reads .nvmrc → 24)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'patra-portal/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: patra-portal/pnpm-lock.yaml

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🎭 Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: 🧪 E2E (Playwright)
        run: pnpm test:e2e

      - name: 📦 Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: patra-portal/playwright-report/
          retention-days: 7

  portal-ci-required-check:
    name: portal-ci-required-check
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: always()
    steps:
      - name: ✓ Check all portal CI jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
