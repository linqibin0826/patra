name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.editorconfig'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.editorconfig'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  POSTGRES_IMAGE: postgres:17
  ROCKETMQ_IMAGE: apache/rocketmq:5.3.1

jobs:
  required-check:
    name: required-check
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: ✓ Required check satisfied
        run: echo "Required check satisfied — gating job for branch protection"

  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle (build cache + dependency cache + configuration cache + wrapper verify)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: 🐳 Pre-pull container images (并发预热,藏入编译关键路径)
        run: |
          docker pull "$POSTGRES_IMAGE" &
          docker pull "$ROCKETMQ_IMAGE" &
          wait

      - name: 🔍 Verify container image versions consistency
        run: |
          set -e
          FAIL=0

          PG_FILE="linqibin-commons/linqibin-spring-boot-starter-test/src/main/java/dev/linqibin/starter/test/container/initializer/PostgreSQLContainerInitializer.java"
          if ! grep -q "private static final String POSTGRESQL_IMAGE = \"$POSTGRES_IMAGE\";" "$PG_FILE"; then
            echo "::error file=$PG_FILE::POSTGRESQL_IMAGE 常量与 workflow env POSTGRES_IMAGE=$POSTGRES_IMAGE 不一致"
            FAIL=1
          fi

          for COMPOSE in \
            "linqibin-commons/linqibin-spring-boot-starter-test/src/main/resources/docker-compose-rocketmq.yml" \
            "patra-api/patra-ingest/patra-ingest-boot/src/test/resources/docker-compose-rocketmq.yml"; do
            COUNT=$(grep -c "image: $ROCKETMQ_IMAGE\b" "$COMPOSE" || true)
            if [ "$COUNT" -ne 2 ]; then
              echo "::error file=$COMPOSE::期望 2 处 'image: $ROCKETMQ_IMAGE',实际 $COUNT 处"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "镜像版本治理 SSOT 失守。修改镜像版本时需同步 ci.yml env + Java 常量 + 2 份 compose 文件。"
            exit 1
          fi
          echo "✓ 3 个文件的镜像版本与 workflow env 一致"

      - name: ✅ Check (test + spotbugsMain + spotlessCheck)
        run: ./gradlew check
        # PAP-12 + PAP-13 baseline 完成后，./gradlew check 同时驱动 test + spotbugsMain + spotlessCheck
        # 决策 C：spotbugsMain / spotlessCheck 失败阻断 PR

      - name: 🔬 Integration tests (Testcontainers)
        run: ./gradlew integrationTest

      - name: 🎯 E2E tests
        run: ./gradlew e2eTest

      - name: 📊 JaCoCo aggregate reports
        run: ./gradlew testCodeCoverageReport integrationTestCodeCoverageReport

      - name: 📈 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml,build/reports/jacoco/integrationTestCodeCoverageReport/integrationTestCodeCoverageReport.xml
          fail_ci_if_error: true

      - name: 📦 Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/
            **/build/test-results/
          retention-days: 7

      - name: 🐛 Upload spotbugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: '**/build/reports/spotbugs/**'
          retention-days: 7
