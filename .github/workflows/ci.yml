name: CI - 持续集成测试

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch: # 支持手动触发

env:
  JAVA_VERSION: '25'
  MAVEN_OPTS: -Xmx2g -Xms512m

jobs:
  # ==================== Job 0: 依赖预构建（共享给其他 jobs） ====================
  setup:
    name: 🔧 依赖构建
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 Java 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔨 并行构建整个项目（仅编译，生成 jar）
        run: mvn clean install -DskipTests -T 1C -B -V

      - name: 📦 缓存构建产物（供其他 jobs 使用）
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.m2/repository
            **/target
          key: build-${{ github.sha }}

  # ==================== Job 1: 单元测试（195个测试） ====================
  unit-tests:
    name: 🚀 单元测试
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 8
    strategy:
      fail-fast: true

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 Java 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 恢复构建产物
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.m2/repository
            **/target
          key: build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: 🧪 并行运行单元测试（排除 IT 和 E2E）
        run: mvn test -Punit-only -T 1C -B -V

      - name: 📊 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/
          retention-days: 7

  # ==================== Job 2: 集成测试（3个测试，使用容器） ====================
  integration-tests:
    name: 🔬 集成测试（IT）
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 8
    strategy:
      fail-fast: true

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 Java 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 恢复构建产物
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.m2/repository
            **/target
          key: build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: 🐳 验证 Docker 环境（用于 Testcontainers）
        run: |
          docker --version
          docker info

      - name: 🔧 配置 Testcontainers
        run: |
          mkdir -p ~/.testcontainers
          echo "testcontainers.reuse.enable=false" > ~/.testcontainers.properties
          echo "ryuk.container.privileged=true" >> ~/.testcontainers.properties

      - name: 🧪 运行集成测试（*IT.java）
        run: mvn test -Pintegration-only -T 1C -B -V
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: 📊 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/
          retention-days: 7

      - name: 🐳 清理 Docker 容器
        if: always()
        run: |
          docker ps -a
          docker container prune -f
          docker volume prune -f

  # ==================== Job 3: E2E 测试（1个测试，使用容器） ====================
  e2e-tests:
    name: 🎯 E2E 测试
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 8
    strategy:
      fail-fast: true

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 Java 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 恢复构建产物
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.m2/repository
            **/target
          key: build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: 🐳 验证 Docker 环境（用于 Testcontainers）
        run: |
          docker --version
          docker info

      - name: 🔧 配置 Testcontainers
        run: |
          mkdir -p ~/.testcontainers
          echo "testcontainers.reuse.enable=false" > ~/.testcontainers.properties
          echo "ryuk.container.privileged=true" >> ~/.testcontainers.properties

      - name: 🧪 运行 E2E 测试（*E2E.java）
        run: mvn test -Pe2e-only -T 1C -B -V
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: 📊 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/
          retention-days: 7

      - name: 🐳 清理 Docker 容器
        if: always()
        run: |
          docker ps -a
          docker container prune -f
          docker volume prune -f

  # ==================== Job 4: 代码质量检查 ====================
  code-quality:
    name: 📐 代码质量检查
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 2

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 Java 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 恢复构建产物
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.m2/repository
            **/target
          key: build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: 🔍 编译检查
        run: mvn compile -B -V -DskipTests

      - name: 📐 代码格式检查（如果配置了 Spotless）
        run: |
          if grep -q "spotless" pom.xml; then
            mvn spotless:check -B
          else
            echo "⚠️ 未配置 Spotless，跳过格式检查"
          fi
        continue-on-error: true

  # ==================== Job 5: 汇总结果 ====================
  test-summary:
    name: 📋 测试汇总
    runs-on: ubuntu-latest
    if: always()
    needs: [unit-tests, integration-tests, e2e-tests, code-quality]

    steps:
      - name: 📊 检查测试结果
        run: |
          echo "🚀 单元测试: ${{ needs.unit-tests.result }}"
          echo "🔬 集成测试: ${{ needs.integration-tests.result }}"
          echo "🎯 E2E 测试: ${{ needs.e2e-tests.result }}"
          echo "📐 代码质量: ${{ needs.code-quality.result }}"

      - name: ✅ 验证所有测试通过
        if: |
          needs.unit-tests.result != 'success' ||
          needs.integration-tests.result != 'success' ||
          needs.e2e-tests.result != 'success'
        run: |
          echo "❌ 测试失败！"
          exit 1

      - name: 🎉 所有测试通过
        if: |
          needs.unit-tests.result == 'success' &&
          needs.integration-tests.result == 'success' &&
          needs.e2e-tests.result == 'success'
        run: |
          echo "✅ 所有测试通过！"
          echo "🚀 可以安全合并到主分支"
