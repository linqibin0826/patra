name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.editorconfig'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.editorconfig'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  required-check:
    name: required-check
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: ✓ Required check satisfied
        run: echo "Required check satisfied — gating job for branch protection"

  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle (build cache + dependency cache + wrapper verify)
        uses: gradle/actions/setup-gradle@v4

      - name: 🧪 Unit tests
        run: ./gradlew test --no-daemon
        # 注：本步骤暂不调 `./gradlew check`，因 spotbugsMain / spotlessCheck 需 PAP-12/13 完成 baseline 后才能阻断 CI

      - name: 🔬 Integration tests (Testcontainers)
        run: ./gradlew integrationTest --no-daemon

      - name: 🎯 E2E tests
        run: ./gradlew e2eTest --no-daemon

      - name: 📊 JaCoCo aggregate reports
        run: ./gradlew testCodeCoverageReport integrationTestCodeCoverageReport --no-daemon

      - name: 📈 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml,build/reports/jacoco/integrationTestCodeCoverageReport/integrationTestCodeCoverageReport.xml
          fail_ci_if_error: true

      - name: 📦 Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/
            **/build/test-results/
          retention-days: 7
