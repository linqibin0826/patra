version: "3.9"

name: patra

# Core infrastructure services required for application runtime
# These services are essential and should always be running

services:
  postgres:
    image: postgres:17
    container_name: patra-postgres
    restart: unless-stopped
    ports: [ "15432:5432" ]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      TZ: Asia/Shanghai
    volumes:
      - ${HOME}/.patra/docker/postgres/data:/var/lib/postgresql/data
      # init 脚本走仓库内相对路径（与 mysql-ops 风格一致），git pull 后变更自动生效；
      # 只在 data 目录为空时由 postgres 镜像执行一次。
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.0.15
    container_name: patra-redis
    restart: unless-stopped
    ports: [ "16379:6379" ]
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    volumes:
      - ${HOME}/.patra/docker/redis/data:/data
      - ${HOME}/.patra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v3.0.2
    container_name: patra-nacos
    restart: unless-stopped
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_TOKEN=${NACOS_AUTH_TOKEN}
      - NACOS_AUTH_IDENTITY_KEY=${NACOS_AUTH_IDENTITY_KEY}
      - NACOS_AUTH_IDENTITY_VALUE=${NACOS_AUTH_IDENTITY_VALUE}
      - JVM_XMS=256m
      - JVM_XMX=256m
      - TZ=Asia/Shanghai
    ports:
      - "8848:8848"   # HTTP / OpenAPI / 老控制台
      - "9848:9848"   # gRPC（2.x+ 客户端心跳与变更推送，缺则只能 HTTP 握手）
      - "8080:8080"   # 新版控制台
    volumes:
      - ${HOME}/.patra/docker/nacos/data:/home/nacos/data
      - ${HOME}/.patra/docker/nacos/logs:/home/nacos/logs
    healthcheck:
      # Nacos 3.x：v1 路径已 deprecated（410 Gone），健康端点搬到 8080 新控制台
      test: [ "CMD-SHELL", "curl -fs http://localhost:8080/v3/console/health/readiness || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  default:
    name: patra-net
