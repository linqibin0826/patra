# ========================================
# Development Environment Configuration
# ========================================
# This configuration is active when spring.profiles.active=dev
# WARNING: Contains development credentials - DO NOT use in production

spring:
  config:
    activate:
      on-profile: dev

  # Development database (local Docker container)
  datasource:
    url: jdbc:mysql://127.0.0.1:13306/patra_registry?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: 123456  # Development only - secure in production

  # Development Redis (local Docker container)
  data:
    redis:
      url: redis://localhost:16379

# 可观测性配置
# 注意：Tracing 由 OTel Agent JVM 参数控制（-Dotel.* 参数）
# 以下配置仅控制 Micrometer Metrics 和 Logging Handler
patra:
  observability:
    enabled: true
    application-name: ${spring.application.name}
    environment: dev
    logging:
      enabled: true
      include-trace-id: true
