server:
  port: 6000

spring:
  application:
    name: patra-registry

  config:
    import:
      - "classpath:registry-error-config.yaml"
      - "optional:nacos:patra-registry.yaml?group=DEFAULT_GROUP&namespace=public"
      - "optional:nacos:patra.yaml?group=DEFAULT_GROUP&namespace=public"

  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  datasource:
    # Example MySQL connection string with explicit charset/time-zone settings.
    url: jdbc:mysql://127.0.0.1:13306/patra_registry?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10       # Max connections in the pool.
      minimum-idle: 5             # Minimum idle connections retained.
      connection-timeout: 30000   # Wait time (ms) for a connection before failing.
      idle-timeout: 600000        # Max idle time (ms) for a connection.
      max-lifetime: 1800000       # Lifetime (ms) before recycling a connection.

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0.1.0

  data:
    redis:
      url: redis://localhost:16379
