# ================================================================
# ArchUnit 全局配置
# 文档: https://www.archunit.org/userguide/html/000_Index.html
# ================================================================

# ------------------------------------------------------------------
# 规则执行控制
# ------------------------------------------------------------------
# 允许规则在没有匹配类时通过(对预防性规则很有用)
# 适用场景: 多模块项目、新规则还没有违规代码、JAR 加载问题
archRule.failOnEmptyShould=false

# ------------------------------------------------------------------
# 冻结模式 (Freeze Mode)
# ------------------------------------------------------------------
# 用途: 逐步修复架构违规,而不是一次性修复所有问题
# 工作原理:
#   1. 首次运行时记录所有现有违规到 freeze store
#   2. 后续运行只检查新增违规
#   3. 修复后可以更新 freeze store
#
# 使用步骤:
#   1. 取消下面注释,运行测试生成 archunit_store/
#   2. 逐步修复违规
#   3. 设置 freeze.refreeze=true 更新冻结记录
#   4. 所有修复完成后,删除 archunit_store/ 和相关配置

# 是否允许创建冻结存储(首次运行需要)
# freeze.store.default.allowStoreCreation=true

# 冻结存储路径(相对于项目根目录)
# freeze.store.default.path=src/test/resources/archunit_store

# 是否重新冻结(false=检查新违规, true=更新冻结记录)
# freeze.refreeze=false

# ------------------------------------------------------------------
# 类缓存优化
# ------------------------------------------------------------------
# 类缓存模式: default(每次测试) | forever(缓存到进程结束)
# 注意: forever 可以提高速度,但可能导致类更新不及时
classCache=default

# MD5 计算用于缓存键(禁用可以提高性能,但可能导致缓存失效)
classCache.useMd5=true

# ------------------------------------------------------------------
# 注意事项
# ------------------------------------------------------------------
# 1. JAR 导入控制需要在 @AnalyzeClasses 的 importOptions 中设置
#    properties 文件无法控制 JAR 导入
#
# 2. 冻结模式适合大型遗留项目,新项目建议直接修复所有违规
#
# 3. 本文件位于 src/test/resources/ 会被自动加载
#    如果需要不同环境的配置,可以通过 Maven Profile 切换
